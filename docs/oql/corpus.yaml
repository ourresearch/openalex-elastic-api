# --- search/value delimiter redesign: parens-bag (#363, 2026-06-08) ----------
# A list of 2+ terms/values must be parenthesized; a single one may be bare.
# `(…)` holds a boolean of atoms (and/or/not, nests). These rows pin the grammar
# + its loud errors.

- id: 91
  tags: [boolean-logic, boolean-nesting]
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): nested boolean inside a search group"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works where title has (foo or (bar and baz))'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: display_name.search, value: foo, operator: has},
        {join: and, filters: [
          {column_id: display_name.search, value: bar, operator: has},
          {column_id: display_name.search, value: baz, operator: has}]}]}]}
  note: 'Parens hold a nested boolean of search terms (the field+operator distribute over every atom). A nested AND inside an OR has no faithful oxurl (URL OR is a flat pipe of one key) → oql-only.'

- id: 92
  tags: [entity-references]
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): multi-valued AND is meaningful (D7)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.countries:GB,authorships.countries:US'
  status: ok
  oql: 'works where country is (GB [United Kingdom] and US [United States])'
  oqo: {get_rows: works, filter_rows: [
        {column_id: authorships.countries, value: US},
        {column_id: authorships.countries, value: GB}]}
  note: '`country is (us and gb)` = works with BOTH a US and a UK authorship (D7; `GB` is the ISO code for the United Kingdom — value-domain validation rejects the non-code `UK`, oxjob #363). A top-level AND, so canonical form is the explicit two-clause `country is US and country is GB` (filter_rows is itself an implicit AND).'

- id: 93
  tags: [boolean-logic, boolean-nesting]
  provenance:
    type: "spec design"
    label: "OQL precedence (#506): mixed and/or inside a group resolves AND > OR"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works where title has (cherry or (apple and banana))'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: display_name.search, value: cherry, operator: has},
        {join: and, filters: [
          {column_id: display_name.search, value: apple, operator: has},
          {column_id: display_name.search, value: banana, operator: has}]}]}]}
  note: 'Mixed and/or at one level is NOT an error (#506) — it resolves by the standard precedence AND > OR (WoS/Scopus/boolean-algebra), so `apple and banana or cherry` = `(apple and banana) or cherry`. The canonical render always re-parenthesizes the grouping. A nested AND inside an OR has no faithful oxurl (URL OR is a flat pipe of one key) → oql-only.'

- id: 95
  tags: [boolean-logic]
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): items use or/and, not commas"
  status: error
  oql: 'works where type is (article, review)'
  diagnostic: OQL_COMMA_IN_GROUP
  note: 'A (…) group joins items with `or`/`and`, not commas. Fix: `type is (article or review)`.'

- id: 96
  tags: [entity-references]
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): undelimited 2+ values must be parenthesized"
  status: error
  oql: 'works where country is us uk'
  diagnostic: OQL_UNDELIMITED_TERM_LIST
  note: 'Two bare values after `is` with no parentheses → loud error (the rule that kills the silent-keyword-truncation footgun). Fix: `country is (us or uk)`.'

- id: 97
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363, decision 24): closed range written as explicit endpoint clauses, mirrors the URL form publication_year:2019-2023"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:2019-2023'
  status: ok
  oql: 'works where year >= (2019) and year <= (2023)'
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 2019, operator: '>='}, {column_id: publication_year, value: 2023, operator: '<='}]}
  note: 'A closed numeric range is written as the two-bound implicit-AND `year >= 2019 and year <= 2023` — the dash range literal `year is 2019-2023` was REMOVED as OQL surface syntax (charter decision 24; typing it now errors OQL_RANGE_LITERAL_REMOVED, see the dash-rejected error row). It parses to two bound leaves and the canonical render is the endpoint form. The OpenAlex URL range form `publication_year:2019-2023` is unaffected — the URL parser still builds the same OQO, so URL round-trip survives (oxjob #363).'

- id: 98
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363): single-ended bound stays an inequality (open dash form is input-only)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:-2023'
  status: ok
  oql: 'works where year <= (2023)'
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 2023, operator: '<='}]}
  note: 'The URL open-upper form `publication_year:-2023` (== `year <= 2023`) maps to the inequality. A single-ended bound is written as a plain inequality (`year <= 2023`); the open-ended dash spellings `year is -2023` / `year is 2019-` were REMOVED with the rest of the range literal (charter decision 24) and now error OQL_RANGE_LITERAL_REMOVED on input. The URL open forms still parse.'

- id: 99
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363, decision 24): float field (FWCI) closed range via decimal endpoints"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=fwci:1.5-3.0'
  status: ok
  oql: 'works where FWCI >= (1.5) and FWCI <= (3.0)'
  oqo: {get_rows: works, filter_rows: [{column_id: fwci, value: 1.5, operator: '>='}, {column_id: fwci, value: 3.0, operator: '<='}]}
  note: 'FWCI is a float field, so endpoint values accept decimals: `FWCI >= 1.5 and FWCI <= 3.0`. The dash literal `FWCI is 1.5-3.0` was removed with the rest of the range syntax (decision 24). The URL range form `fwci:1.5-3.0` is unaffected.'

- id: 100
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL numeric bounds (#363, decision 24): a strict integer bound PAIR stays strict (no inclusive-range inference)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:>42,publication_year:<100'
  status: ok
  oql: 'works where year > (42) and year < (100)'
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 42, operator: '>'}, {column_id: publication_year, value: 100, operator: '<'}]}
  note: 'Strict bounds stay exactly as written — `year > 42 and year < 100` is NOT rewritten to the inclusive `>= 43 and <= 99`. The ±1 strict-integer-pair collapse (which fed the removed dash range) was dropped with the range literal (charter decision 24): more faithful, no inference. Renders as two strict endpoint clauses / `publication_year:>42,publication_year:<100` (oxjob #363).'

- id: 179
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL numeric range literal removed (#363, decision 24): typing a dash range errors with an endpoint fix-it"
  status: error
  oql: 'works where year is 2019-2023'
  diagnostic: OQL_RANGE_LITERAL_REMOVED
  note: 'The dash range literal was removed as OQL surface syntax (charter decision 24) — write explicit endpoints `year >= 2019 and year <= 2023`. The reject is hard (no lenient parse): a typed `field is lo-hi` / open-ended `lo-` / `-hi` on a num field raises OQL_RANGE_LITERAL_REMOVED with a fix-it echoing the actual endpoints. A non-numeric dash term (`year is 2019-abc`) still falls through to OQL_BAD_NUMBER. The OpenAlex URL range form and OQO bounds are unaffected (oxjob #363).'

- id: 101
  tags: [boolean-nesting, filter]
  provenance:
    type: "analytics question"
    label: "Multi-valued source type with multi-word slugs (ebook platform, book series) — the URL form quotes the whole pipe-list"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=primary_location.source.type:book%20series|conference|ebook%20platform|journal'
  status: ok
  oql: |-
    works where source type is (
        "book series"
        or conference
        or "ebook platform"
        or journal
      )
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: primary_location.source.type, value: journal},
        {column_id: primary_location.source.type, value: conference},
        {column_id: primary_location.source.type, value: 'ebook platform'},
        {column_id: primary_location.source.type, value: 'book series'}]}]}
  note: 'The source''s type (render word = engine display_name `source type`). A multi-word slug like `ebook platform` is one atom, so it must be QUOTED inside the value group (else it re-parses as adjacency-AND). The URL wraps the whole `|`-list in quotes ("spaces are literal, not AND"); the parser strips the enclosing quotes before the pipe-split, mirroring the engine (oxjob #363).'

