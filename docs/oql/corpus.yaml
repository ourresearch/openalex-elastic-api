# ---------------------------------------------------------------------------
# Collection membership — `is in collection` (oxjob #363). A Collection is a
# named col_… set; membership is its own operator (distinct from `is`). Same-type
# (this row's entity, column_id `collection` → `filter=collection:col_…`) and
# cross-type (a referenced entity, keeps its column → bare `<field>:col_…`).
# Cross-type also exercised by row 49 (country). See oql-spec §3.10.
# ---------------------------------------------------------------------------
- id: 83
  tags: [entity-references]
  provenance:
    type: "spec design"
    label: "Collections-in-filters (oxjob #363; IA from #367)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=collection:col_abc123'
  status: ok
  oql: 'works where work is in collection (col_abc123)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: collection, value: col_abc123, operator: in collection}]}
  note: 'Same-type membership: works that are members of a Collection of works. Renders to the dedicated `filter=collection:col_…` API param (CollectionField).'

- id: 84
  tags: [entity-references, negation]
  provenance:
    type: "spec design"
