- id: 78
  category: "librarian & SR queries"
  provenance:
    type: "zendesk ticket"
    label: "OpenAlex zd#8101 — Claire's real systematic review"
    url: "https://openalex.zendesk.com/agent/tickets/8101"
  oxurl_representable: true
  status: ok
  note: >-
    The real zd#8101 systematic-review tree (Claire): a 5-block AND of large
    OR-synonym groups, each block scoped to a different search field
    (title / title & abstract x2 / anywhere). 114 leaves. No explicit oqo oracle
    — the harness asserts OQO->OQL->OQO identity through the whole tree.
  oql: |-
    works
    where title contains any of (
        Boy, Girl, Minors, Prepubescent, adolescent, boys, child's, children, girls,
        juvenile, preadolescent, preteen, pubertal, pubescent, schoolboy,
        schoolchild, schoolgirl, teen, tweenage, tweens, youth, youths,
        "Pre pubescent", "early adolescent", "pre adolescent", "pre pubertal",
        "school aged", "young people", "young person",
      )
      and title contains any of (
        Height, bodyweight, fat, fatness, obese, obesity, overweight, thin,
        thinness, weight, "anti fat", "being fat", "being thin", "body esteem",
        "body hatred", "body ideal", "body image", "body positive", "body shame",
        "body shape", "body size", "body sizes", "fat ideal", "ideal body",
        "thin ideal", "weight bias",
      )
      and fulltext contains any of (
        Britain, England, GB, Scotland, Scottish, UK, Wales, Welsh,
        "English adolescent", "English children", "English girls",
        "English schoolchild", "English teen", "English young people",
        "North Ireland", "North Irish", "Northern Ireland", "Northern Irish",
        "United Kingdom", "english boys", "english school",
      )
      and title & abstract contains any of (
        attitude, attitudes, beliefs, diaries, diary, experiences, in-depth,
