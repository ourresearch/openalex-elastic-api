- id: 134
  tags: [sort]
  provenance:
    type: "spec design"
    label: "OQL return clause (#450) — composes with sort"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=type:article&sort=cited_by_count:desc&select=id,doi'
  status: ok
  oql: 'works where type is article sort by citation count desc return id, DOI'
  oqo: {get_rows: works, filter_rows: [
        {column_id: type, value: article}],
       sort_by: [{column_id: cited_by_count, direction: desc}],
       select: [id, doi]}
  note: |-
    Directives compose; input order is free but the canonical render emits
    `return` last. A column whose friendly name round-trips renders friendly
    (`DOI`); one whose display name collides with another column's (works
