          or coagulopathy
          or thrombocytopenia
          or "blood coagulation disorders"
          or "coagulation disorder"
        )
      )
      and (
        keyword is (keywords/central-venous-catheter [Central venous catheter])
        or title/abstract has (CVC or "central line" or "central venous catheter")
      )
