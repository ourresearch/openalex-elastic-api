# OQL v2 normative corpus  (oxjob #330)
# =====================================================================
# The cases-first heart of the OQL v2 spec. Each row is one worked example;
# the spec prose (docs/oql-spec.md) is the generalization UNDER these cases.
#
# This file is machine-checked by tests/oql/test_corpus_roundtrip.py:
#   * status: ok | hint   -> parse(oql) == oqo  AND  OQO->OQL->OQO is identity
#   * status: error       -> parse(oql) raises OQLError whose .code == diagnostic
#   * status: out-of-scope -> documented non-representable / intentionally
#                            unsupported; not executed (the deliberate scope
#                            boundary of OQL/OQO, e.g. funder-by-acronym)
#
# `oqo` is the independent oracle (authored from intent / the #284 corpus, NOT
# from this parser). Equality is checked after canonicalization, so operand
# order and string-vs-typed scalars don't matter here. Every ok/hint row carries
# an `oqo`; row 78 (the 114-leaf zd#8101 SR tree) is the one materialized from
# its `oql` by regen_corpus_oql.py (#384) so the GUI mirror needs no live parser.
#
# Per-row facets (#345; category->tags refactor #432):
#   * tags       — multi-valued, free-form labels for the DSL feature(s) /
#       audience a case exercises (the GUI playground filters on them; OR
#       semantics across selected tags). Replaced the old single-valued,
#       mutually-exclusive `category` — cases poke OVERLAPPING features, so one
#       bucket per row fought us. No central registry; pick a meaningful slug.
#       Current vocabulary (extend freely): negation, boolean-logic,
#       boolean-nesting, phrase-exact, proximity, wildcard, search-semantics,
#       entity-references, group-by, sort, sample, filter, and the marker
#       `sr-transcription` (a verbatim librarian / systematic-review boolean
#       strategy — out of scope for the NL->OQO eval; see test_nl_eval.py). The
#       former "librarian & SR queries" topical category is gone: its real origin
#       already lives in `provenance`, so those rows now carry `sr-transcription`
#       + their actual feature tags.
#   * provenance — real origin: {type, label, url?}. `type` is one of
#       "spec design"        (#330 design pass — the spec-design spine),
#       "analytics question" (OpenAlex OAQ#/AKQ# fossils — the analytics rows),
#       "librarian guide"    (library SLR/search guides — Cranfield, U.Manitoba,
#                             UCL, Caltech, KCL, Tufts, …),
#       "vendor docs"        (Scopus/Elsevier, Dimensions DSL, Clarivate WoS),
#       "zendesk ticket"     (real OpenAlex user query — zd#8101, "Claire").
#     This replaced the old conflated `source` ("spec spine" / "#284 worked
#     examples"); see archived/oqo-spec/work/EXAMPLES.md for the per-row sources
#     (each #284 OXURL verified live 2026-05-30).
#   * oxurl_status — for each `ok` row, how it relates to the classic
#     api.openalex.org / openalex.org URL syntax (oxjob #384). One of:
#       has-oxurl          — renders to a classic SERP URL (the common case).
#       oql-only           — a valid OQO the server runs, but OXURL *can't*
#                            express it (e.g. row 78's OR across stemmed
#                            `display_name.search` and no-stem
#                            `display_name.search.exact` — `|` only ORs within one
#                            key). This is an OQL expressiveness WIN, not a bug.
#       translator-bug     — OXURL *should* express it per spec, but the renderer
#                            is wrong/incomplete (a query_translation/ bug to fix).
#       server-unsupported — valid OQO the live API can't execute yet. The URL
#                            renders; the server won't run it. (No rows currently:
#                            row 48 multi-dim group_by was resolved by oxjob #387.)
#     Authored (editorial) — the three failure modes are NOT mechanically
#     distinguishable from a render success/failure. Only `ok` rows carry it;
#     error / out-of-scope rows are non-queries with no oxurl status.
#   * oxurl — the rendered classic URL string, a DERIVED field written by
#     docs/oql/regen_corpus_oql.py (render via query_translation/url_renderer.py).
#     null for `oql-only` rows (the renderer raises) and absent on error/oos rows.
#     The GUI playground (openalex-gui/src/oqlCorpus.js) is now a pure yaml->js
#     copy of these fields — no live parser call. Kept fresh by the #384 drift
#     gate; re-run regen_corpus_oql.py after any oql/oqo edit.
version: 2
rows:

# ---------------------------------------------------------------------------
# A. Entity references, sets, annotations  (EXPLORE §2.1, §2.2)
# ---------------------------------------------------------------------------
- id: 1
  tags: [entity-references]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.institutions.lineage:I136199984'
  status: ok
  oql: 'works where institution is (I136199984 [Harvard])'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.institutions.lineage, value: I136199984}]}
  note: ID authoritative; [Harvard] is an ignored annotation, regenerated on output.

- id: 2
  tags: [entity-references]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.institutions.lineage:I136199984'
  status: ok
  oql: 'works where institution is (I136199984 [Harvard])'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.institutions.lineage, value: I136199984}]}
  note: The annotation is free text and is not validated — it cannot lie because nothing reads it.

- id: 3
  tags: [boolean-nesting, entity-references]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.institutions.lineage:I33213144|I97018004'
  status: ok
  oql: 'works where institution is (I33213144 [Harvard] or I97018004 [Stanford])'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: authorships.institutions.lineage, value: I33213144},
        {column_id: authorships.institutions.lineage, value: I97018004}]}]}
  note: '( ... ) is a value list here; per-item annotations allowed.'

- id: 4
  addr: |-
    1 institution is
    1.0 institution
    1.1 not I33213144
    1.2 not I97018004
  tags: [entity-references, negation]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.institutions.lineage:!I33213144,authorships.institutions.lineage:!I97018004'
  status: ok
  oql: |-
    works where institution is (
        not I33213144 [Harvard]
        and not I97018004 [Stanford]
      )
  oqo: {get_rows: works, filter_rows: [
        {column_id: authorships.institutions.lineage, value: I33213144, is_negated: true},
        {column_id: authorships.institutions.lineage, value: I97018004, is_negated: true}]}
  note: 'Negated set = NOT(a OR b) = (NOT a) AND (NOT b) by De Morgan; canonical NNF carries negation on the leaves.'

- id: 5
  tags: [boolean-nesting, entity-references]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=type:article|review'
  status: ok
  oql: 'works where type is (article or review)'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: type, value: article}, {column_id: type, value: review}]}]}
  note: 'A 2+ value list is parenthesized and joined by `or`/`and`: `type is (article or review)` is an OR-group of equality leaves.'

- id: 6
  tags: [entity-references]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where institution is [Harvard]'
  diagnostic: OQL_MISSING_ENTITY_ID
  note: A display-name annotation with no ID — the v1.1 silent-mismatch footgun, now a loud error.

# ---------------------------------------------------------------------------
# B. Booleans / precedence / casing  (EXPLORE §2.4)
# ---------------------------------------------------------------------------
- id: 7
  tags: [boolean-logic, boolean-nesting]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:apple,display_name.search:banana|cherry'
  status: ok
  oql: 'works where title has (apple and (banana or cherry))'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: apple, operator: has},
        {join: or, filters: [
          {column_id: display_name.search, value: banana, operator: has},
          {column_id: display_name.search, value: cherry, operator: has}]}]}
  note: Mixed and/or with explicit parens is unambiguous.

- id: 8
  tags: [boolean-logic]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has apple and banana or cherry'
  diagnostic: OQL_UNDELIMITED_TERM_LIST
  note: '`apple and banana or cherry` are bare terms after `has` with no parentheses (#363 requires 2+ terms be parenthesized) — caught before the mixed-and/or check. Fix-it: wrap them, e.g. `has (apple and (banana or cherry))`.'

- id: 9
  tags: [boolean-logic]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:apple,display_name.search:banana,display_name.search:cherry'
  status: ok
  oql: 'works where title has (apple and banana and cherry)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: apple, operator: has},
        {column_id: display_name.search, value: banana, operator: has},
        {column_id: display_name.search, value: cherry, operator: has}]}
  note: Pure-and is associative, no parens needed.

- id: 10
  tags: [boolean-logic]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:apple,display_name.search:banana,display_name.search:cherry'
  status: ok
  oql: 'works where title has (apple and banana and cherry)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: apple, operator: has},
        {column_id: display_name.search, value: banana, operator: has},
        {column_id: display_name.search, value: cherry, operator: has}]}
  note: 'SPACE = implicit AND (Google/PubMed convention) — `apple banana cherry` == `apple and banana and cherry`.'

- id: 87
  tags: [boolean-logic, boolean-nesting]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works where abstract has (banana) or title has (apple)'
  oqo: {get_rows: works, filter_rows: [
        {join: or, filters: [
          {column_id: display_name.search, value: apple, operator: has},
          {column_id: abstract.search, value: banana, operator: has}]}]}
  note: >-
    Cross-field OR — an OR branch whose two arms scope DIFFERENT search fields
    (title vs. abstract). The contrast to row 7's same-field OR. Parses,
    validates, and executes natively (`bool.should`, minimum_should_match=1),
    but oxurl has no top-level OR across distinct filter keys (commas = AND), so
    the renderer correctly raises `URLRenderError: OR across different fields` →
    `oql-only`. An OQL-over-OXURL expressiveness win, same class as row 78.

# ---------------------------------------------------------------------------
# C. The gauntlet — search semantics  (the spine; teaches the v2 model)
#    Stemming is ON by default; quotes turn it OFF (exact); `near` is the bridge.
# ---------------------------------------------------------------------------
- id: 11
  tags: [search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:change,display_name.search:climate'
  status: ok
  oql: 'works where title has (change and climate)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: climate, operator: has},
        {column_id: display_name.search, value: change, operator: has}]}
  note: 'EXPLICIT `and` = two cross-field AND leaves (the two-filter oxurl); words may be apart (recall). Post-D2-reversal (#363): a bare run `(climate change)` is instead ONE adjacency-boosted node (row 126) — use explicit `and` when you mean two separate search nodes.'

- id: 12
  tags: [phrase-exact, search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:%22climate%20change%22'
  status: ok
  oql: 'works where title has ("climate change")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"climate change"', operator: has}]}
  note: 'QUOTES = exact adjacent phrase, stemming OFF (.search.exact). The precision lever.'

- id: 13
  tags: [proximity, search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:%22whopper%20junior%22'
  status: ok
  oql: 'works where title has (stemmed "whopper junior")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: '"whopper junior"', operator: has}]}
  note: 'NEAR = stemmed adjacent phrase (.search) → matches "whoppers junior". The bridge that keeps recall on a phrase.'

- id: 14
  tags: [phrase-exact, search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:cat'
  status: ok
  oql: 'works where title has ("cat")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: cat, operator: has}]}
  note: 'Quoting a SINGLE word = exact (no plurals). Same rule as a phrase — quotes always mean exact.'

- id: 15
  tags: [search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:cat'
  status: ok
  oql: 'works where title has (cat)'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: cat, operator: has}]}
  note: 'Bare word = stemmed (matches cats). Contrast with row 14 "cat" (exact).'

- id: 16
  tags: [phrase-exact, search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:%22rock%20or%20roll%22'
  status: ok
  oql: 'works where title has ("rock or roll")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"rock or roll"', operator: has}]}
  note: 'Inside quotes = literal: the `or` is a word, not a connective. One exact phrase.'

- id: 17
  tags: [search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has climate change or warming'
  diagnostic: OQL_UNDELIMITED_TERM_LIST
  note: 'Bare search terms after `has` with no parentheses (#363): a reserved word could be silently swallowed, so 2+ terms must be parenthesized. Fix-it offers `has (climate (change or warming))` or `has ((climate change) or warming)`.'

- id: 18
  tags: [boolean-nesting, search-semantics]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:climate,display_name.search:change|warming'
  status: ok
  oql: 'works where title has (climate and (change or warming))'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: climate, operator: has},
        {join: or, filters: [
          {column_id: display_name.search, value: change, operator: has},
          {column_id: display_name.search, value: warming, operator: has}]}]}
  note: 'The likely-intended disambiguation: climate AND (change OR warming). Implicit AND between `climate` and the group; the only `or` is nested.'

- id: 19
  tags: [phrase-exact, search-semantics, wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:bar*'
  status: ok
  oql: 'works where title has ("bar*")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: 'bar*', operator: has}]}
  note: 'Quoted wildcard = the sanctioned path (oxjob #364): runs on the no-stem `.search.exact` column. Reverses #337''s old `OQL_WILDCARD_IN_QUOTES` — quotes are now where wildcards belong (stemming would drop the literal prefix).'

- id: 20
  tags: [search-semantics, wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has bar*'
  diagnostic: OQL_WILDCARD_NEEDS_EXACT
  note: 'Bare prefix wildcard is stemmed → silently wrong (oxjob #364): stemming removes the literal prefix at index time. Fix-it: quote it → "bar*" (runs on the no-stem column).'

# ---------------------------------------------------------------------------
# D. Proximity / wildcard edge matrix  (EXPLORE §2.5, §3)
# ---------------------------------------------------------------------------
- id: 21
  tags: [phrase-exact, proximity]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: out-of-scope
  oql: null
  note: 'Single-phrase slop `"smart phone"~3` (one quoted phrase whose tokens wiggle internally) is OXURL-only now (oxjob #514). The OQL surface ditched the `within N words` suffix form; the same intent is written as the list form `within 3 ("smart", "phone")` (row 28), which compiles to an ES `intervals` query. The bare `~N` single-phrase value still parses/executes on the FROZEN OXURL surface (`?filter=display_name.search.exact:"smart phone"~3`, query_string slop) — untouched — but has no round-tripping OQL form (it renders best-effort to the list form, which re-parses to the binary `~N~` shape).'

- id: 22
  tags: [phrase-exact, wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:foo*bar'
  status: ok
  oql: 'works where title has ("foo*bar")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: 'foo*bar', operator: has}]}
  note: Mid-word `*` (>=3-char prefix, within one token), quoted so it runs on the no-stem `.search.exact` column (oxjob #364). Bare `foo*bar` is now an error (OQL_WILDCARD_NEEDS_EXACT).

- id: 23
  tags: [phrase-exact, proximity]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:wom%3Fn'
  status: ok
  oql: 'works where title has ("wom?n")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: 'wom?n', operator: has}]}
  note: Mid-word `?` = exactly one character, quoted so it runs on the no-stem `.search.exact` column (oxjob #364). Bare `wom?n` is now an error (OQL_WILDCARD_NEEDS_EXACT).

- id: 24
  tags: [proximity]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has *cycle'
  diagnostic: OQL_LEADING_WILDCARD
  note: Leading `*` unsupported (perf; allow_leading_wildcard=False).

- id: 25
  tags: [proximity]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has ?cycle'
  diagnostic: OQL_LEADING_WILDCARD
  note: Leading `?` unsupported.

- id: 26
  tags: [wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has ab*'
  diagnostic: OQL_SHORT_WILDCARD_PREFIX
  note: Sub-3-char prefix -> error, not a silent literal.

- id: 27
  tags: [phrase-exact, proximity, wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: out-of-scope
  oql: null
  note: 'Wildcard inside a single-phrase slop `"smart phone*"~3` — OXURL-only now (oxjob #514), like row 21. The OQL list surface expresses wildcard proximity as a quoted operand, e.g. `within 3 ("smart", "phone*")` (row 189). The single-phrase wildcard `~N` value still parses/executes on the FROZEN OXURL surface via an ES `intervals` query (oxjob #355), untouched; it just has no round-tripping OQL form.'

- id: 28
  tags: [phrase-exact, proximity]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:%22smart%22~3~%22phone%22'
  status: ok
  oql: 'works where title has (within 3 ("smart", "phone"))'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"smart"~3~"phone"', operator: has}]}
  note: 'List proximity (the ONE proximity surface, oxjob #514): K operands NEAR each other within an N-word window, unordered. Two quoted (exact, frozen) operands here = WoS `NEAR/N`. SUPPORTED via an ES `intervals` query — each operand is its own (possibly multi-word, adjacent) sub-interval, combined ordered=false + max_gaps=N (oxjob #355 Goal B; live works-v33 = 5,183 hits). Value encoding `"A"~N~"B"` is the K=2 case of `"op1"~N~"op2"~...`; quoted operands route to `.search.exact` (exact). The OXURL `~N~` notation is frozen and unchanged.'

- id: 29
  tags: [proximity, wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  status: error
  oql: 'works where title has within 3 (smart*, phone)'
  diagnostic: OQL_WILDCARD_NEEDS_EXACT
  note: 'A bare (stemmed) proximity operand can''t carry a wildcard — stemming strips the literal prefix, so a wildcard on `.search` is silently wrong (#364). Quote the operand to run it exact: `within 3 ("smart*", "phone")` (then the #355 intervals path handles the wildcard). Wildcards compose with proximity fine when the operand is quoted (rows 81/189).'

- id: 79
  tags: [phrase-exact, wildcard]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:%22smart*%20phone%22'
  status: ok
  oql: 'works where title has ("smart* phone")'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"smart* phone"', operator: has}]}
  note: 'Multi-token quoted wildcard phrase WITHOUT proximity = adjacency. SUPPORTED via an ES `intervals` query (ordered=true, max_gaps=0; trailing-prefix -> prefix rule, mid-word ? -> wildcard rule) — query_string would silently drop the wildcard. The no-`within` sibling of rows 27/58 (oxjob #355 Goal A; live works-v33 = 4,986 hits vs plain "smart phone" = 4,975). A SINGLE quoted wildcard token ("studies*") is #364''s unquoted no-stem path, not this. Leading / sub-3-char-prefix wildcards inside the phrase still rejected (#337).'

- id: 80
  tags: [phrase-exact, proximity]
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search.exact:%22machine%20learning%22~5~%22neural%20network%22'
  status: ok
  oql: 'works where title has (within 5 ("machine learning", "neural network"))'
