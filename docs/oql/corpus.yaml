- id: 132
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL return clause (#450) — column projection over the column namespace"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:2020-&select=id,title,cited_by_count'
  status: ok
  oql: 'works where year >= 2020 return id, title, citation count'
  oqo: {get_rows: works, filter_rows: [
        {column_id: publication_year, value: 2020, operator: '>='}],
       select: [id, title, cited_by_count]}
  note: |-
    `return col1, col2` is the OQL surface of `OQO.select` (the URL `?select=`).
    Columns resolve over the COLUMN namespace (the registry `column` capability =
    `?select=`-able result fields), by friendly display name ("citation count") or
    raw id. Order is meaningful (display order). Canonical render places `return`
    last, after sort/sample.

- id: 133
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL return clause (#450) — schema-only result columns"
  oxurl_status: has-oxurl
