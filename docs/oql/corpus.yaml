# OQL v2 normative corpus  (oxjob #330)
# =====================================================================
# The cases-first heart of the OQL v2 spec. Each row is one worked example;
# the spec prose (docs/oql-spec.md) is the generalization UNDER these cases.
#
# This file is machine-checked by tests/oql/test_corpus_roundtrip.py:
#   * status: ok | hint   -> parse(oql) == oqo  AND  OQO->OQL->OQO is identity
#   * status: error       -> parse(oql) raises OQLError whose .code == diagnostic
#   * status: boundary    -> documented non-representable; not executed
#
# `oqo` is the independent oracle (authored from intent / the #284 corpus, NOT
# from this parser). Equality is checked after canonicalization, so operand
# order and string-vs-typed scalars don't matter here. When `oqo` is omitted the
# harness only asserts round-trip identity (used for the huge L21 tree).
#
# Provenance: spine cases = #330 design pass (EXPLORE.md §2). "#284" rows =
# archived/oqo-spec/work/EXAMPLES.md (each OXURL verified live 2026-05-30).
# Where v2 deliberately diverges from the #284 OQO (search encoding), the note
# says so — those are corrections, not transcription drift.
version: 2
rows:

# ---------------------------------------------------------------------------
# A. Entity references, sets, annotations  (EXPLORE §2.1, §2.2)
# ---------------------------------------------------------------------------
- id: ENT1
  group: entity-refs
  status: ok
  oql: 'works where institution is I136199984 [Harvard]'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.institutions.lineage, value: I136199984}]}
  note: ID authoritative; [Harvard] is an ignored annotation, regenerated on output.

- id: ENT2
  group: entity-refs
  status: ok
  oql: 'works where institution is I136199984 [those Harvard bastards, go Yale]'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.institutions.lineage, value: I136199984}]}
  note: The annotation is free text and is not validated — it cannot lie because nothing reads it.

- id: ENT3
  group: entity-refs
  status: ok
  oql: 'works where institution is any of (I33213144 [Harvard], I97018004 [Stanford])'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: authorships.institutions.lineage, value: I33213144},
        {column_id: authorships.institutions.lineage, value: I97018004}]}]}
  note: '( ... ) is a value list here; per-item annotations allowed.'

- id: ENT4
  group: entity-refs
  status: ok
  oql: 'works where institution is not any of (I33213144, I97018004)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: authorships.institutions.lineage, value: I33213144, is_negated: true},
        {column_id: authorships.institutions.lineage, value: I97018004, is_negated: true}]}
  note: 'Negated set = NOT(a OR b) = (NOT a) AND (NOT b) by De Morgan; canonical NNF carries negation on the leaves.'

- id: ENT5
  group: entity-refs
  status: ok
  oql: 'works where type is in (article, review)'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: type, value: article}, {column_id: type, value: review}]}]}
  note: '`is in` is accepted on input; canonical output spells it `is any of`.'

- id: ENT6
  group: entity-refs
  status: error
  oql: 'works where institution is [Harvard]'
  diagnostic: OQL_MISSING_ENTITY_ID
  note: A display-name annotation with no ID — the v1.1 silent-mismatch footgun, now a loud error.

# ---------------------------------------------------------------------------
# B. Booleans / precedence / casing  (EXPLORE §2.4)
# ---------------------------------------------------------------------------
- id: BOOL1
  group: booleans
  status: ok
  oql: 'works where title contains "foo" and ("bar" or "baz")'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: foo, operator: contains},
        {join: or, filters: [
          {column_id: display_name.search, value: bar, operator: contains},
          {column_id: display_name.search, value: baz, operator: contains}]}]}
  note: 'Mixed logic with explicit parens is unambiguous. Quoting single words is a no-op so "foo"==foo.'

- id: BOOL2
  group: booleans
  status: error
  oql: 'works where title contains "foo" and "bar" or "baz"'
  diagnostic: OQL_MIXED_BOOL_NEEDS_PARENS
  note: Mixed AND/OR at one level with no parens — the one deliberate departure from WoS/Scopus.

- id: BOOL3
  group: booleans
  status: ok
  oql: 'works where title contains "a" and "b" and "c"'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: a, operator: contains},
        {column_id: display_name.search, value: b, operator: contains},
        {column_id: display_name.search, value: c, operator: contains}]}
  note: Pure-AND is associative, no parens needed.

- id: BOOL4
  group: booleans
  status: ok
  oql: 'works where title contains foo and (bar or baz)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: foo, operator: contains},
        {join: or, filters: [
          {column_id: display_name.search, value: bar, operator: contains},
          {column_id: display_name.search, value: baz, operator: contains}]}]}
  note: Connectives are case-insensitive on input; canonical output is lowercase and/or/not.

# ---------------------------------------------------------------------------
# C. The 9 gauntlet cases — search semantics  (PLAN.md spine)
# ---------------------------------------------------------------------------
- id: G1
  group: gauntlet
  status: ok
  oql: 'works where title contains foo and (bar or baz)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: foo, operator: contains},
        {join: or, filters: [
          {column_id: display_name.search, value: bar, operator: contains},
          {column_id: display_name.search, value: baz, operator: contains}]}]}
  note: 'foo AND (bar OR baz), lemmatized.'

- id: G2
  group: gauntlet
  status: ok
  oql: 'works where title contains any of (foo, bar, baz)'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: display_name.search, value: foo, operator: contains},
        {column_id: display_name.search, value: bar, operator: contains},
        {column_id: display_name.search, value: baz, operator: contains}]}]}
  note: OR over the flat list.

- id: G3
  group: gauntlet
  status: ok
  oql: 'works where title contains any of (foo, "foo bar", exactly baz)'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: display_name.search, value: foo, operator: contains},
        {column_id: display_name.search, value: '"foo bar"', operator: contains},
        {column_id: display_name.search.exact, value: baz, operator: contains}]}]}
  note: Per-item modifiers; the OR-leaves can sit on different columns (.search x2, .search.exact x1).

- id: G4
  group: gauntlet
  status: ok
  oql: 'works where title contains all of (foo, "foo or bar")'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: foo, operator: contains},
        {column_id: display_name.search, value: '"foo or bar"', operator: contains}]}
  note: AND; the `or` is inside quotes = literal text, not a connective.

- id: G5
  group: gauntlet
  status: ok
  oql: 'works where title contains foo and "bar OR baz"'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: foo, operator: contains},
        {column_id: display_name.search, value: '"bar OR baz"', operator: contains}]}
  note: 'The sneaky one — pure-AND; `OR` inside quotes is a literal word, not mixed logic.'

- id: G6
  group: gauntlet
  status: ok
  oql: 'works where title contains exactly foo and bar'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search.exact, value: foo, operator: contains},
        {column_id: display_name.search, value: bar, operator: contains}]}
  note: '`exactly` binds ONE operand -> (exactly foo) AND bar. `exactly (foo AND bar)` would distribute.'

- id: G7
  group: gauntlet
  status: ok
  oql: 'works where title contains foo and "bar"'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: foo, operator: contains},
        {column_id: display_name.search, value: bar, operator: contains}]}
  note: Quoting a single word is a no-op ("bar" == bar); quotes mean phrase, not exactness.

- id: G8
  group: gauntlet
  status: error
  oql: 'works where title contains "bar*"'
  diagnostic: OQL_WILDCARD_IN_QUOTES
  note: '`*` inside quotes can''t wildcard. Fix-it: use bar* unquoted.'

- id: G9
  group: gauntlet
  status: ok
  oql: 'works where title contains bar*'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: 'bar*', operator: contains}]}
  note: Bare prefix wildcard.

# ---------------------------------------------------------------------------
# D. Proximity / wildcard edge matrix  (EXPLORE §2.5, §3)
# ---------------------------------------------------------------------------
- id: PW1
  group: proximity-wildcard
  status: ok
  oql: 'works where title contains "smart phone" within 3 words'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: '"smart phone"~3', operator: contains}]}
  note: 'Whole-phrase proximity -> "smart phone"~3; up to N positional moves apart, any order.'

- id: PW2
  group: proximity-wildcard
  status: ok
  oql: 'works where title contains foo*bar'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: 'foo*bar', operator: contains}]}
  note: Mid-word `*` (>=3-char prefix, within one token).

- id: PW3
  group: proximity-wildcard
  status: ok
  oql: 'works where title contains wom?n'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: 'wom?n', operator: contains}]}
  note: Mid-word `?` = exactly one character.

- id: PW4
  group: proximity-wildcard
  status: error
  oql: 'works where title contains *cycle'
  diagnostic: OQL_LEADING_WILDCARD
  note: Leading `*` unsupported (perf; allow_leading_wildcard=False).

- id: PW5
  group: proximity-wildcard
  status: error
  oql: 'works where title contains ?cycle'
  diagnostic: OQL_LEADING_WILDCARD
  note: Leading `?` unsupported.

- id: PW6
  group: proximity-wildcard
  status: error
  oql: 'works where title contains ab*'
  diagnostic: OQL_SHORT_WILDCARD_PREFIX
  note: Sub-3-char prefix -> error, not a silent literal.

- id: PW7
  group: proximity-wildcard
  status: error
  oql: 'works where title contains "smart phone*" within 3 words'
  diagnostic: OQL_WILDCARD_IN_QUOTES
  note: Wildcard inside a proximity phrase — the unsupported L02c combination; loud error.

- id: PW8
  group: proximity-wildcard
  status: error
  oql: 'works where title contains "smart" within 3 words of "phone"'
  diagnostic: OQL_BINARY_PROXIMITY
  note: Binary "X within N of Y" is unsupported (ES slop is whole-phrase); loud error.

- id: PW9
  group: proximity-wildcard
  status: error
  oql: 'works where title contains smart* within 3 words'
  diagnostic: OQL_WILDCARD_IN_PROXIMITY
  note: Wildcard + proximity can't compose.

- id: PW10
  group: proximity-wildcard
  status: ok
  oql: 'works where abstract is similar to "graph neural networks for molecular property prediction"'
  oqo: {get_rows: works, filter_rows: [{column_id: abstract.search.semantic,
        value: graph neural networks for molecular property prediction, operator: contains}]}
  note: Semantic (search.semantic, 2-phase vector search).

- id: PW11
  group: proximity-wildcard
  status: ok
  oql: 'works where title & abstract contains exactly "machine learning"'
  oqo: {get_rows: works, filter_rows: [{column_id: title_and_abstract.search.exact, value: '"machine learning"', operator: contains}]}
  note: Non-stemmed exact phrase (.search.exact).

- id: PW12
  group: proximity-wildcard
  status: ok
  oql: 'works where title contains "whopper junior"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: '"whopper junior"', operator: contains}]}
  note: STEMMED phrase -> matches "whoppers junior" (recall win); quotes = phrase, stemming stays ON.

