  status: ok
  oql: 'works return open access, authorships'
  oqo: {get_rows: works, select: [open_access, authorships]}
  note: |-
    `open_access` / `authorships` are result columns with NO filter surface — they
    exist only in the column namespace (`?select=`-able result fields), which is
    mostly disjoint from the filter namespace (works: 58 columns vs 207 filter
    predicates, 25 overlap). Before #450 these validated against a separate
    marshmallow-schema vocabulary; now both clauses gate off the one capability
