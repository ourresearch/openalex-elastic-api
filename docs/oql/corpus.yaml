# ---------------------------------------------------------------------------
# I. Real systematic-review search strategies, mined from the published OA
#    literature (oxjob #434 -> #363). One representative sample per shape across
#    fields. ~90% of real SR strings specify no field, just a boolean tree of
#    quoted phrases / words thrown at the default field -> we map those to OQL's
