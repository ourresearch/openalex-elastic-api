- id: 160
  tags: [boolean-nesting, sr-transcription]
  provenance:
    type: "systematic review"
    label: 'Mined SR · central venous catheter & coagulopathy (PubMed [Mesh]+[tiab])'
    url: 'https://doi.org/10.1055/a-2770-0060'
  oxurl_status: oql-only
  oxurl: null
  status: ok
  note: >-
    PubMed [Mesh]+[tiab] block. Per the 'represent the concept, not the words'
    rule, MeSH controlled-vocabulary terms map to OpenAlex keyword-ENTITY
    membership where one resolves cleanly ("Central Venous Catheters"[Mesh] ->
    keyword is keywords/central-venous-catheter; "Anticoagulants"[Mesh] ->
    keywords/anticoagulant), OR'd with the [tiab] free-text terms in the same
    block (concept OR text -- the real PubMed pattern). MeSH terms with no
    clean OpenAlex keyword (Thrombocytopenia, Blood Coagulation Disorders)
    fall back to free-text. oql-only: ORs an entity-membership filter with a
    title/abstract search.
  oql: |-
    works where (
        keyword is keywords/anticoagulant [Anticoagulant]
        or title/abstract contains (
          INR or
          aPTT or
          coagulopathy or
          thrombocytopenia or
          "blood coagulation disorders" or
          "coagulation disorder"
        )
      )
      and (
        keyword is keywords/central-venous-catheter [Central venous catheter]
        or title/abstract contains (
          CVC or
          "central line" or
          "central venous catheter"
        )
      )
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [{column_id: keywords.id, value: keywords/anticoagulant},
    {column_id: title_and_abstract.search, value: INR, operator: contains}, {column_id: title_and_abstract.search,
    value: aPTT, operator: contains}, {column_id: title_and_abstract.search, value: coagulopathy,
    operator: contains}, {column_id: title_and_abstract.search, value: thrombocytopenia,
    operator: contains}, {column_id: title_and_abstract.search.exact, value: '"blood coagulation
    disorders"', operator: contains}, {column_id: title_and_abstract.search.exact, value: '"coagulation
    disorder"', operator: contains}]}, {join: or, filters: [{column_id: keywords.id, value: keywords/central-venous-catheter},
    {column_id: title_and_abstract.search, value: CVC, operator: contains}, {column_id: title_and_abstract.search.exact,
    value: '"central line"', operator: contains}, {column_id: title_and_abstract.search.exact,
    value: '"central venous catheter"', operator: contains}]}]}

