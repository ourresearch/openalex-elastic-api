- id: 55
  category: "librarian & SR queries"
  provenance:
    type: "librarian guide"
    label: "Cranfield SLR combining-strings guide"
    url: "https://blogs.cranfield.ac.uk/library/slr-combining-strings/"
  oxurl_representable: true
  status: ok
  oql: |-
    works
    where title & abstract contains agile
      and title & abstract contains any of (near "cycle time", near "lead time")
      and title & abstract contains any of (
        near "demand chain",
        near "supply chain",
        near "value chain",
      )
  oqo: {get_rows: works, filter_rows: [
        {column_id: title_and_abstract.search, value: agile, operator: contains},
        {join: or, filters: [
          {column_id: title_and_abstract.search, value: '"supply chain"', operator: contains},
          {column_id: title_and_abstract.search, value: '"demand chain"', operator: contains},
          {column_id: title_and_abstract.search, value: '"value chain"', operator: contains}]},
        {join: or, filters: [
          {column_id: title_and_abstract.search, value: '"lead time"', operator: contains},
          {column_id: title_and_abstract.search, value: '"cycle time"', operator: contains}]}]}
  note: 'AND of OR-groups; the synonym phrases use `near` (stemmed adjacent) for recall. Top level is pure-and so no parens.'

- id: 56
