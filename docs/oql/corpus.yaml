# ---------------------------------------------------------------------------
# N. Negation shapes  (#432 — the NOT problem space)
# ---------------------------------------------------------------------------
# A deliberate catalogue of negation forms, tagged `negation`, so the playground
# can show the whole shape space at once. Seeded by probing each shape through
# the live parser (#432) to record its ACTUAL current behavior — several are
# subtle: De Morgan distribution, double-negation collapse, positive-less
# groups, and the rejected wildcard/list forms. The compact within-value WoS
# `term!"phrase"` idiom (the thing librarians actually paste) is NOT yet here as
# a green case: it currently MIS-parses ("New England" survives as a positive
# term) — an open design problem, see work/NEGATION_PROBLEM_SPACE.md.
- id: 168
  tags: [negation]
  provenance:
    type: "spec design"
    label: "Predicate-level negation (standalone)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:!dog'
  status: ok
  note: 'Standalone predicate negation — a lone negated leaf with no positive clause. Renders with the `does not have` predicate, not a `not …` value-group.'
  oql: 'works where title has (not dog)'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: dog, operator: has, is_negated: true}]}
- id: 169
  tags: [negation, boolean-nesting]
  provenance:
    type: "spec design"
    label: "NOT of an OR-group (De Morgan)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:!cat,display_name.search:!dog'
  status: ok
  note: 'NOT distributes over an OR-group: `not (cat or dog)` canonicalizes to `not cat and not dog` (De Morgan). The OR-group disappears — a structure change, not just a label flip.'
  oql: 'works where title has (not cat and not dog)'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: cat, operator: has, is_negated: true}, {column_id: display_name.search, value: dog, operator: has, is_negated: true}]}
- id: 170
  tags: [negation]
  provenance:
    type: "spec design"
    label: "Double negation collapses"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:dog'
  status: ok
  note: 'Double negation collapses: `not not dog` == `dog`. Input is accepted and silently simplified to the positive form.'
  oql: 'works where title has (dog)'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: dog, operator: has}]}
- id: 171
  tags: [negation]
  provenance:
    type: "spec design"
    label: "Positive-less (pure-negative) group"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:!dog'
  status: ok
  note: 'A group with ONLY an exclusion and no positive clause — "everything except dog". Parses fine and equals the standalone predicate (168). OPEN QUESTION (#432): does the live API actually run a pure-negative query, or does it need a positive anchor? See work/NEGATION_PROBLEM_SPACE.md.'
  oql: 'works where title has (not dog)'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: dog, operator: has, is_negated: true}]}
- id: 172
  tags: [negation]
  provenance:
    type: "spec design"
    label: "Cross-field negation"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=abstract.search:!dog,display_name.search:cat'
  status: ok
  note: 'Negation on a different field than the positive clause: include cat in the title, exclude dog from the abstract.'
  oql: 'works where abstract has (not dog) and title has (cat)'
  oqo: {get_rows: works, filter_rows: [{column_id: abstract.search, value: dog, operator: has, is_negated: true}, {column_id: display_name.search, value: cat, operator: has}]}
- id: 173
  tags: [negation, entity-references]
  provenance:
    type: "spec design"
    label: "Negated entity reference (is not)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.author.id:!A5066175077'
  status: ok
  note: 'Negation on an entity-id leaf: exclude works by a specific author. The `is not` predicate on an entity column.'
  oql: 'works where author is (not A5066175077 [Stephen Hawking])'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.author.id, value: A5066175077, is_negated: true}]}
- id: 174
  tags: [negation, filter]
  provenance:
    type: "spec design"
    label: "Negated closed-vocab scalar (is not)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=type:!article'
  status: ok
  note: 'Negation on a closed-vocabulary scalar column: exclude a work type.'
  oql: 'works where type is (not article)'
  oqo: {get_rows: works, filter_rows: [{column_id: type, value: article, is_negated: true}]}
- id: 175
  tags: [negation, proximity]
  provenance:
    type: "spec design"
    label: "Negated co-occurrence group"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:!climate%20%2B%20change'
  status: ok
  note: 'Negating a `+` co-occurrence group: exclude documents where climate and change co-occur. The negation wraps the whole adjacency group as one negated phrase leaf.'
  oql: 'works where title has (not climate + change)'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: 'climate + change', operator: has, is_negated: true}]}
- id: 176
  tags: [negation, boolean-nesting]
  provenance:
    type: "vendor docs"
    label: "Scopus/WoS AND NOT trailing exclusions"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=display_name.search:!c,display_name.search:!d,display_name.search:a|b'
  status: ok
  note: 'The Scopus/WoS `(... ) AND NOT a AND NOT b` shape: an OR-group core followed by trailing exclusions. Canonicalizes with the negated leaves hoisted ahead of the OR-group.'
  oql: 'works where title has (not c and not d and (a or b))'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: c, operator: has, is_negated: true}, {column_id: display_name.search, value: d, operator: has, is_negated: true}, {join: or, filters: [{column_id: display_name.search, value: a, operator: has}, {column_id: display_name.search, value: b, operator: has}]}]}
- id: 177
  tags: [negation, wildcard]
  provenance:
    type: "spec design"
    label: "Negated bare wildcard — rejected"
  status: error
  oql: 'works where title has (not(climat*))'
  diagnostic: OQL_WILDCARD_NEEDS_EXACT
  note: 'A negated bare wildcard is rejected for the same reason as a positive one — wildcards run on exact (no-stem) text. Fix: quote it, `not("climat*")`. Negation does not change the wildcard rule.'
- id: 180
  tags: [filter]
  provenance:
    type: "spec design"
    label: "OQL search operator `contains` renamed to `has` (#363, decision 27): the old keyword hard-errors with a fix-it"
  status: error
  oql: 'works where title contains dog'
  diagnostic: OQL_CONTAINS_RENAMED
  note: 'The search operator `contains` was renamed to `has` (charter decision 27 — shorter, friendlier, fits a monitor better). The reject is hard (greenfield, no lenient parse, same stance as decisions 23 & 24): typing the old `contains` raises OQL_CONTAINS_RENAMED with a fix-it echoing the new keyword (`use: <field> has <terms>`). The OQO operator was renamed in lockstep (`operator: has`). (oxjob #363)'
- id: 181
  tags: [filter, negation]
  provenance:
    type: "spec design"
    label: "OQL `does not contain` renamed to `does not have` (#363, decision 27)"
  status: error
  oql: 'works where title does not contain dog'
  diagnostic: OQL_CONTAINS_RENAMED
  note: 'The negation sugar `does not contain` was renamed in lockstep with `contains` → `has` (charter decision 27): write `does not have` (input sugar → is_negated, never re-emitted; the canonical render is the bare `title has not dog`). The old spelling hard-errors OQL_CONTAINS_RENAMED with a `does not have` fix-it. (oxjob #363)'

# --- Corpus selector (oxjob #481) ---------------------------------------------
# `corpus` is a top-level OQO field selecting which corpus(es) seed the base set:
# core (curated, default) / expansion (the expansion corpus alone) / all = both.
# OQL surface is a parenthetical right after the entity. core is the default and
# renders omitted; aliases ((all)/(expansion)/(xpac)/(core)/…) normalize to the
# canonical spelling (covered in tests/oql/test_corpus_selector.py, not here —
# corpus rows must carry the CANONICAL oql to satisfy the formatter gate). Non-core
# corpora are OQL-only: the legacy include_xpac param is on #464's drop list, so
# url_renderer raises and oxurl is null.
- id: 186
  tags: [corpus]
  provenance:
    type: "spec design"
    label: "OQL corpus selector — all corpora (core + expansion) (#481)"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works (all corpora)'
  oqo: {get_rows: works, corpus: all}
  note: 'The `all` corpus = core + expansion. Canonical spelling `(all corpora)`; `(all)` is an accepted alias. A corpus SELECTION (which corpus seeds the base set), distinct from a filter (which only narrows).'
- id: 183
  tags: [corpus]
  provenance:
    type: "spec design"
    label: "OQL corpus selector — expansion corpus alone (#481)"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works (expansion corpus)'
  oqo: {get_rows: works, corpus: expansion}
  note: 'The `expansion` corpus is the xpac corpus ALONE — a distinct set (broader coverage, lower quality), NOT a superset of core. Subsumes the retired `is_xpac` filter. Aliases: `(expansion)`, `(xpac)`, `(xpac corpus)`.'
- id: 184
  tags: [corpus, filter]
  provenance:
    type: "spec design"
    label: "OQL corpus selector — corpus + where clause (#481)"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works (all corpora) where open access is (true)'
  oqo: {get_rows: works, corpus: all, filter_rows: [{column_id: open_access.is_oa, value: true}]}
  note: 'The corpus parenthetical sits between the entity and `where`; filters still narrow WITHIN the selected corpus.'
- id: 185
  tags: [corpus]
  provenance:
    type: "spec design"
    label: "OQL corpus selector — unknown corpus is a hard error (#481)"
  status: error
  oql: 'works (banana) where year is 2020'
  diagnostic: OQL_BAD_CORPUS
  note: 'A parenthetical after the entity that is not a known corpus hard-errors OQL_BAD_CORPUS with a fix-it naming core / expansion / all. (core is the default, so a bare `works` needs no parenthetical.)'

# ---------------------------------------------------------------------------
# N. Always-parenthesized values + explicit connectives in value groups (#554)
# ---------------------------------------------------------------------------
- id: 193
  tags: [filter, boolean-logic]
  provenance:
    type: "spec design"
    label: "Bare adjacency between is-group values is a loud error (#554)"
  status: error
  oql: 'works where type is (article review)'
  diagnostic: OQL_GROUP_VALUES_NEED_CONNECTIVE
  note: 'Two values in an `is (…)` group with no connective is a hard error with a "did you mean or?" fix-it — NEVER a silent implicit AND (pre-#554 this parsed as `(article and review)` → count 0 for a single-valued field, the exact silent-misparse species the language forbids). The `has (…)` search side is the one deliberate adjacency exception (a bare-word run is ONE stemmed node, D2 reversal).'
- id: 194
  tags: [filter]
  provenance:
    type: "spec design"
    label: "unknown inside a value group is the null sentinel (#554)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=language:null'
  status: ok
  oql: 'works where language is (unknown)'
  oqo: {get_rows: works, filter_rows: [{column_id: language, value: null}]}
  note: 'The parenthesized group is the canonical null test (bare `language is unknown` stays accepted input). Pre-#554 an in-group `unknown` misparsed as the literal string "unknown" → invalid_value.'
- id: 195
  tags: [filter, boolean-logic]
  provenance:
    type: "spec design"
    label: "Mixed value group with the null sentinel (#554)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=language:en|null'
  status: ok
  oql: 'works where language is (en [English] or unknown)'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: language, value: en},
        {column_id: language, value: null}]}]}
  note: 'Newly expressible with #554: `unknown` is an ordinary group member (the null sentinel), so language-is-English OR language-unknown is one clause.'
- id: 196
  tags: [filter]
  provenance:
    type: "spec design"
    label: "A comparison group takes exactly one bound (#554)"
  status: error
  oql: 'works where year >= (2019 or 2020)'
  diagnostic: OQL_GROUP_NEEDS_ONE_VALUE
  note: 'Scalar-domain operators take exactly ONE atom in their (always-parenthesized) group — never a distribution. `year is (2019 or 2020)` is fine (an `is` set); the COMPARISON is the scalar surface.'
- id: 197
  tags: [filter]
  provenance:
    type: "spec design"
    label: "A boolean group takes exactly one value (#554)"
  status: error
  oql: 'works where retracted is (true or false)'
  diagnostic: OQL_GROUP_NEEDS_ONE_VALUE
  note: 'A yes/no property takes one value; `is (not true)` folds to `is (false)` on input like `is not true` always has.'
- id: 198
  tags: [filter]
  provenance:
    type: "spec design"
    label: "A collection group takes exactly one col_ ref (#554)"
  status: error
  oql: 'works where work is in collection (col_abc123 or col_def456)'
  diagnostic: OQL_GROUP_NEEDS_ONE_VALUE
  note: 'One collection per clause (v1 rule, §3.10) — union several with or-clauses: (work is in collection (col_a) or work is in collection (col_b)).'
