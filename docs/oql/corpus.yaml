  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): nested boolean inside a search group"
  oxurl_status: oql-only
  oxurl: null
  status: ok
  oql: 'works where title contains (foo or (bar and baz))'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: display_name.search, value: foo, operator: contains},
        {join: and, filters: [
          {column_id: display_name.search, value: bar, operator: contains},
          {column_id: display_name.search, value: baz, operator: contains}]}]}]}
  note: 'Parens hold a nested boolean of search terms (the field+operator distribute over every atom). A nested AND inside an OR has no faithful oxurl (URL OR is a flat pipe of one key) → oql-only.'

- id: 92
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): multi-valued AND is meaningful (D7)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=authorships.countries:GB,authorships.countries:US'
  status: ok
  oql: 'works where country is GB [United Kingdom] and country is US [United States]'
  oqo: {get_rows: works, filter_rows: [
        {column_id: authorships.countries, value: US},
        {column_id: authorships.countries, value: GB}]}
  note: '`country is (us and gb)` = works with BOTH a US and a UK authorship (D7; `GB` is the ISO code for the United Kingdom — value-domain validation rejects the non-code `UK`, oxjob #363). A top-level AND, so canonical form is the explicit two-clause `country is US and country is GB` (filter_rows is itself an implicit AND).'

- id: 93
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): mixed and/or inside a group still errors"
  status: error
  oql: 'works where title contains (apple and banana or cherry)'
  diagnostic: OQL_MIXED_BOOL_NEEDS_PARENS
  note: 'Inside a (…) group a space is an AND, so this mixes and/or at one level → loud error (no silent precedence). Fix: `(apple and (banana or cherry))` or `((apple and banana) or cherry)`.'

- id: 94
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): the removed `any of` list keyword"
  status: error
  oql: 'works where type is any of (article, review)'
  diagnostic: OQL_LIST_KEYWORD_REMOVED
  note: '`is any of`/`is in`/`all of` value-list keywords were removed (#363). Fix-it: write it with parentheses, `type is (article or review)`.'

- id: 95
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): commas no longer separate group items"
  status: error
  oql: 'works where type is (article, review)'
  diagnostic: OQL_COMMA_IN_GROUP
  note: 'Items in a (…) group are joined by `or`/`and`, not commas (#363). Fix: `type is (article or review)`.'

- id: 96
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL parens-bag (#363): undelimited 2+ values must be parenthesized"
  status: error
  oql: 'works where country is us uk'
  diagnostic: OQL_UNDELIMITED_TERM_LIST
  note: 'Two bare values after `is` with no parentheses → loud error (the rule that kills the silent-keyword-truncation footgun). Fix: `country is (us or uk)`.'

- id: 97
  category: "filter, sort & sample"
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363): closed bounded range, mirrors the URL form publication_year:2019-2023"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:2019-2023'
  status: ok
  oql: 'works where year is 2019-2023'
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 2019, operator: '>='}, {column_id: publication_year, value: 2023, operator: '<='}]}
  note: 'A closed numeric range is sugar for the two-bound implicit-AND `year >= 2019 and year <= 2023`; it parses to two bound leaves and the canonical render is the dash form. Round-trips to the same OQO the URL parser builds from `publication_year:2019-2023` (oxjob #363).'

- id: 98
  category: "filter, sort & sample"
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363): single-ended bound stays an inequality (open dash form is input-only)"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:-2023'
  status: ok
  oql: 'works where year <= 2023'
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 2023, operator: '<='}]}
  note: 'The URL open-upper form `publication_year:-2023` (== `year <= 2023`) maps to the inequality, NOT a dash range — only a two-ended range is written `a-b`. The dash spellings `year is -2023` / `year is 2019-` are ACCEPTED on input but canonicalize back to `year <= 2023` / `year >= 2020`. A leading hyphen is always open-upper (no numeric field takes negatives, so unambiguous).'

- id: 99
  category: "filter, sort & sample"
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363): float field (FWCI) range with decimals"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=fwci:1.5-3.0'
  status: ok
  oql: 'works where FWCI is 1.5-3.0'
  oqo: {get_rows: works, filter_rows: [{column_id: fwci, value: 1.5, operator: '>='}, {column_id: fwci, value: 3.0, operator: '<='}]}
  note: 'FWCI is a float field, so range/scalar values accept decimals. Distinct from year/citation count (integers), where a strict bound PAIR collapses via ±1 (row 100); floats have no clean ±1 so strict float pairs stay as inequalities.'

- id: 100
  category: "filter, sort & sample"
  provenance:
    type: "spec design"
    label: "OQL numeric range (#363): strict integer bound PAIR canonicalizes to an inclusive range"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=publication_year:43-99'
  status: ok
  oql: 'works where year is 43-99'
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 43, operator: '>='}, {column_id: publication_year, value: 99, operator: '<='}]}
  note: 'On integer fields a strict bound PAIR is an exact inclusive interval: `year > 42 and year < 100` canonicalizes to `>= 43 and <= 99` -> renders `year is 43-99` / `publication_year:43-99`. Only when the column has BOTH bounds; a lone `citation count > 100` keeps its strict inequality (oxjob #363).'

- id: 101
  category: "filter, sort & sample"
  provenance:
    type: "analytics question"
    label: "Multi-valued source type with multi-word slugs (ebook platform, book series) — the URL form quotes the whole pipe-list"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=primary_location.source.type:book%20series|conference|ebook%20platform|journal'
  status: ok
  oql: |-
    works where source type is (
        "book series" or
        conference or
        "ebook platform" or
        journal
      )
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: primary_location.source.type, value: journal},
        {column_id: primary_location.source.type, value: conference},
        {column_id: primary_location.source.type, value: 'ebook platform'},
        {column_id: primary_location.source.type, value: 'book series'}]}]}
  note: 'The source''s type (render word = engine display_name `source type`). A multi-word slug like `ebook platform` is one atom, so it must be QUOTED inside the value group (else it re-parses as adjacency-AND). The URL wraps the whole `|`-list in quotes ("spaces are literal, not AND"); the parser strips the enclosing quotes before the pipe-split, mirroring the engine (oxjob #363).'

- id: 102
  category: "filter, sort & sample"
  provenance:
    type: "analytics question"
    label: "Jason's random-search walkthrough — primary_topic.subfield.id had no OQL surface while its siblings topic/field/domain were registered"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=primary_topic.subfield.id:2712,type:article'
  status: ok
  oql: |-
    works where subfield is 2712 [Endocrinology, Diabetes and Metabolism]
      and type is article
  oqo: {get_rows: works, filter_rows: [{column_id: primary_topic.subfield.id, value: '2712'}, {column_id: type, value: article}]}
  note: 'The subfield of a work''s primary topic (topic hierarchy domain > field > subfield > topic). Render word = registry display_name "subfield"; the value resolves a `[display name]` via the native subfields namespace. Was an "unknown field" before oxjob #363 (only field/domain/topic were registered).'

- id: 103
  category: "filter, sort & sample"
  provenance:
    type: "analytics question"
    label: "Raw oxurl column ids are always accepted as OQL input aliases (oxjob #363); ids.pmid has no curated friendly name"
  oxurl_status: has-oxurl
  oxurl: 'https://openalex.org/works?filter=ids.pmid:12345678'
  status: ok
  oql: 'works where PMID is 12345678'
  oqo: {get_rows: works, filter_rows: [{column_id: ids.pmid, value: '12345678'}]}
  note: 'Any works-registry column_id is accepted as an OQL input alias even with no curated friendly name — valuable for oxurl-fluent users, language-independence, and testing. The raw key is NOT canonical (it renders back as the raw id, round-tripping). Synthesized from the registry operator metadata. (oxjob #363; search columns are the one excluded family — expressed via the curated fields + quoting.)'

- id: 104
  category: "filter, sort & sample"
  provenance:
    type: "analytics question"
    label: "Jason's random-search walkthrough batch 2 — citation_normalized_percentile.value had no curated OQL surface (was an 'unknown field')"
  oxurl_status: has-oxurl
