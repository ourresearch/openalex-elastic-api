# OQL v2 normative corpus  (oxjob #330)
# =====================================================================
# The cases-first heart of the OQL v2 spec. Each row is one worked example;
# the spec prose (docs/oql-spec.md) is the generalization UNDER these cases.
#
# This file is machine-checked by tests/oql/test_corpus_roundtrip.py:
#   * status: ok | hint   -> parse(oql) == oqo  AND  OQO->OQL->OQO is identity
#   * status: error       -> parse(oql) raises OQLError whose .code == diagnostic
#   * status: out-of-scope -> documented non-representable / intentionally
#                            unsupported; not executed (the deliberate scope
#                            boundary of OQL/OQO, e.g. funder-by-acronym)
#
# `oqo` is the independent oracle (authored from intent / the #284 corpus, NOT
# from this parser). Equality is checked after canonicalization, so operand
# order and string-vs-typed scalars don't matter here. When `oqo` is omitted the
# harness only asserts round-trip identity (used for row 78, the huge SR tree).
#
# Per-row facets (#345):
#   * category   — topical grouping (7 values; the GUI playground filters on it).
#   * provenance — real origin: {type, label, url?}. `type` is one of
#       "spec design"        (#330 design pass — the spec-design spine),
#       "analytics question" (OpenAlex OAQ#/AKQ# fossils — the analytics rows),
#       "librarian guide"    (library SLR/search guides — Cranfield, U.Manitoba,
#                             UCL, Caltech, KCL, Tufts, …),
#       "vendor docs"        (Scopus/Elsevier, Dimensions DSL, Clarivate WoS),
#       "zendesk ticket"     (real OpenAlex user query — zd#8101, "Claire").
#     This replaced the old conflated `source` ("spec spine" / "#284 worked
#     examples"); see archived/oqo-spec/work/EXAMPLES.md for the per-row sources
#     (each #284 OXURL verified live 2026-05-30).
#   * oxurl_representable — does the spec say this query is expressible as a
#     classic api.openalex.org URL? false for the invalid-OQL error rows and the
#     genuinely non-representable `out-of-scope` rows (row 68 funder-by-acronym,
#     row 76 set-reference). The GUI playground auto-renders the
#     oxurl for the `true` rows via query_translation/url_renderer.py; a `true`
#     row that fails to render is a *translator gap* to fix, not a corpus error.
version: 2
rows:

# ---------------------------------------------------------------------------
# A. Entity references, sets, annotations  (EXPLORE §2.1, §2.2)
# ---------------------------------------------------------------------------
- id: 1
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where institution is I136199984 [Harvard]'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.institutions.lineage, value: I136199984}]}
  note: ID authoritative; [Harvard] is an ignored annotation, regenerated on output.

- id: 2
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where institution is I136199984 [Harvard]'
  oqo: {get_rows: works, filter_rows: [{column_id: authorships.institutions.lineage, value: I136199984}]}
  note: The annotation is free text and is not validated — it cannot lie because nothing reads it.

- id: 3
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where institution is any of (I33213144 [Harvard], I97018004 [Stanford])'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: authorships.institutions.lineage, value: I33213144},
        {column_id: authorships.institutions.lineage, value: I97018004}]}]}
  note: '( ... ) is a value list here; per-item annotations allowed.'

- id: 4
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: |-
    works
    where institution is not I33213144 [Harvard]
      and institution is not I97018004 [Stanford]
  oqo: {get_rows: works, filter_rows: [
        {column_id: authorships.institutions.lineage, value: I33213144, is_negated: true},
        {column_id: authorships.institutions.lineage, value: I97018004, is_negated: true}]}
  note: 'Negated set = NOT(a OR b) = (NOT a) AND (NOT b) by De Morgan; canonical NNF carries negation on the leaves.'

- id: 5
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where type is any of (article, review)'
  oqo: {get_rows: works, filter_rows: [{join: or, filters: [
        {column_id: type, value: article}, {column_id: type, value: review}]}]}
  note: '`is in` is accepted on input; canonical output spells it `is any of`.'

- id: 6
  category: "entity references"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where institution is [Harvard]'
  diagnostic: OQL_MISSING_ENTITY_ID
  note: A display-name annotation with no ID — the v1.1 silent-mismatch footgun, now a loud error.

# ---------------------------------------------------------------------------
# B. Booleans / precedence / casing  (EXPLORE §2.4)
# ---------------------------------------------------------------------------
- id: 7
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains apple and title contains any of (banana, cherry)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: apple, operator: contains},
        {join: or, filters: [
          {column_id: display_name.search, value: banana, operator: contains},
          {column_id: display_name.search, value: cherry, operator: contains}]}]}
  note: Mixed and/or with explicit parens is unambiguous.

- id: 8
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains apple and banana or cherry'
  diagnostic: OQL_MIXED_BOOL_NEEDS_PARENS
  note: Explicit mixed and/or at one level with no parens — the one deliberate departure from WoS/Scopus.

- id: 9
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: |-
    works
    where title contains apple and title contains banana and title contains cherry
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: apple, operator: contains},
        {column_id: display_name.search, value: banana, operator: contains},
        {column_id: display_name.search, value: cherry, operator: contains}]}
  note: Pure-and is associative, no parens needed.

- id: 10
  category: "boolean logic"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: |-
    works
    where title contains apple and title contains banana and title contains cherry
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: apple, operator: contains},
        {column_id: display_name.search, value: banana, operator: contains},
        {column_id: display_name.search, value: cherry, operator: contains}]}
  note: 'SPACE = implicit AND (Google/PubMed convention) — `apple banana cherry` == `apple and banana and cherry`.'

# ---------------------------------------------------------------------------
# C. The gauntlet — search semantics  (the spine; teaches the v2 model)
#    Stemming is ON by default; quotes turn it OFF (exact); `near` is the bridge.
# ---------------------------------------------------------------------------
- id: 11
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains change and title contains climate'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: climate, operator: contains},
        {column_id: display_name.search, value: change, operator: contains}]}
  note: 'SPACE = stemmed AND; the words may be apart (recall). The everyday default.'

- id: 12
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "climate change"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"climate change"', operator: contains}]}
  note: 'QUOTES = exact adjacent phrase, stemming OFF (.search.exact). The precision lever.'

- id: 13
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains near "whopper junior"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: '"whopper junior"', operator: contains}]}
  note: 'NEAR = stemmed adjacent phrase (.search) → matches "whoppers junior". The bridge that keeps recall on a phrase.'

- id: 14
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "cat"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: cat, operator: contains}]}
  note: 'Quoting a SINGLE word = exact (no plurals). Same rule as a phrase — quotes always mean exact.'

- id: 15
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains cat'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: cat, operator: contains}]}
  note: 'Bare word = stemmed (matches cats). Contrast with row 14 "cat" (exact).'

- id: 16
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "rock or roll"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"rock or roll"', operator: contains}]}
  note: 'Inside quotes = literal: the `or` is a word, not a connective. One exact phrase.'

- id: 17
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains climate change or warming'
  diagnostic: OQL_MIXED_BOOL_NEEDS_PARENS
  note: 'A space is an AND, so this mixes and/or at one level → loud error (no silent order-of-operations). Fix-it offers `climate (change or warming)` or `(climate change) or warming`.'

- id: 18
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains climate and title contains any of (change, warming)'
  oqo: {get_rows: works, filter_rows: [
        {column_id: display_name.search, value: climate, operator: contains},
        {join: or, filters: [
          {column_id: display_name.search, value: change, operator: contains},
          {column_id: display_name.search, value: warming, operator: contains}]}]}
  note: 'The likely-intended disambiguation: climate AND (change OR warming). Implicit AND between `climate` and the group; the only `or` is nested.'

- id: 19
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "bar*"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: 'bar*', operator: contains}]}
  note: 'Quoted wildcard = the sanctioned path (oxjob #364): runs on the no-stem `.search.exact` column. Reverses #337''s old `OQL_WILDCARD_IN_QUOTES` — quotes are now where wildcards belong (stemming would drop the literal prefix).'

- id: 20
  category: "search semantics"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains bar*'
  diagnostic: OQL_WILDCARD_NEEDS_EXACT
  note: 'Bare prefix wildcard is stemmed → silently wrong (oxjob #364): stemming removes the literal prefix at index time. Fix-it: quote it → "bar*" (runs on the no-stem column).'

# ---------------------------------------------------------------------------
# D. Proximity / wildcard edge matrix  (EXPLORE §2.5, §3)
# ---------------------------------------------------------------------------
- id: 21
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "smart phone" within 3 words'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"smart phone"~3', operator: contains}]}
  note: 'Exact proximity (quoted) → up to N positional moves apart, any order.'

- id: 22
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "foo*bar"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: 'foo*bar', operator: contains}]}
  note: Mid-word `*` (>=3-char prefix, within one token), quoted so it runs on the no-stem `.search.exact` column (oxjob #364). Bare `foo*bar` is now an error (OQL_WILDCARD_NEEDS_EXACT).

- id: 23
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "wom?n"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: 'wom?n', operator: contains}]}
  note: Mid-word `?` = exactly one character, quoted so it runs on the no-stem `.search.exact` column (oxjob #364). Bare `wom?n` is now an error (OQL_WILDCARD_NEEDS_EXACT).

- id: 24
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains *cycle'
  diagnostic: OQL_LEADING_WILDCARD
  note: Leading `*` unsupported (perf; allow_leading_wildcard=False).

- id: 25
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains ?cycle'
  diagnostic: OQL_LEADING_WILDCARD
  note: Leading `?` unsupported.

- id: 26
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains ab*'
  diagnostic: OQL_SHORT_WILDCARD_PREFIX
  note: Sub-3-char prefix -> error, not a silent literal.

- id: 27
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "smart phone*" within 3 words'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"smart phone*"~3', operator: contains}]}
  note: 'Wildcard inside a quoted proximity phrase — SUPPORTED via an ES `intervals` query (trailing-prefix -> prefix rule, mid-word ? -> wildcard rule); ordered=false + max_gaps=N maps 1:1 to slop N (oxjob #355, pinned live on works-v33). query_string used to silently drop the wildcard. Leading / sub-3-char-prefix wildcards inside the phrase still rejected (#337).'

- id: 28
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "smart" within 3 words of "phone"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"smart"~3~"phone"', operator: contains}]}
  note: 'Binary proximity: two SEPARATE quoted operands NEAR each other (WoS `NEAR/N`). SUPPORTED via an ES `intervals` query — each operand is its own (possibly multi-word, adjacent) sub-interval and the two are combined ordered=false + max_gaps=N (oxjob #355 Goal B; live works-v33 = 5,183 hits). `match_phrase`+slop genuinely cannot express it (slop is whole-phrase). Value encoding `"A"~N~"B"` extends the single-phrase `"phrase"~N` form. Exact-only (both operands quoted/no-stem).'

- id: 29
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains smart* within 3 words'
  diagnostic: OQL_WILDCARD_IN_PROXIMITY
  note: Wildcard + proximity can't compose.

- id: 79
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "smart* phone"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"smart* phone"', operator: contains}]}
  note: 'Multi-token quoted wildcard phrase WITHOUT proximity = adjacency. SUPPORTED via an ES `intervals` query (ordered=true, max_gaps=0; trailing-prefix -> prefix rule, mid-word ? -> wildcard rule) — query_string would silently drop the wildcard. The no-`within` sibling of rows 27/58 (oxjob #355 Goal A; live works-v33 = 4,986 hits vs plain "smart phone" = 4,975). A SINGLE quoted wildcard token ("studies*") is #364''s unquoted no-stem path, not this. Leading / sub-3-char-prefix wildcards inside the phrase still rejected (#337).'

- id: 80
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains "machine learning" within 5 words of "neural network"'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search.exact, value: '"machine learning"~5~"neural network"', operator: contains}]}
  note: 'Binary proximity with MULTI-WORD phrase operands on both sides — each phrase stays intact (its own ordered, gap-0 adjacency sub-interval) and the two are combined ordered=false + max_gaps=5. This is the shape only WoS (NEAR/N) and an ES `intervals`/`span` engine can express; `match_phrase`+slop cannot keep two phrases as units (oxjob #355 Goal B; live works-v33 = 1,531 hits).'

- id: 81
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains "pro*" within 3 words of "pre*"'
  diagnostic: OQL_MULTI_WILDCARD_SHORT_PREFIX
  note: 'oxjob #355 perf guard: two wildcards in one intervals query (here a binary proximity) each need a >=4-char prefix — short 3-char prefixes multiply postings expansion (live: "pro* pro*" ~265ms vs ~45ms at 4 chars). "prot*" within 3 words of "pret*" is accepted. A lone wildcard keeps #337''s >=3-char floor.'

- id: 82
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: false
  status: error
  oql: 'works where title contains "big* cat* dog*"'
  diagnostic: OQL_TOO_MANY_WILDCARDS
  note: 'oxjob #355 perf guard: at most 2 wildcards are allowed in one phrase / proximity / binary-proximity (one ES `intervals` query); 3+ multiplies prefix-expansion cost unacceptably. Remove a wildcard or split into separate searches.'

- id: 30
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: |-
    works
    where abstract is similar to "graph neural networks for molecular property prediction"
  oqo: {get_rows: works, filter_rows: [{column_id: abstract.search.semantic,
        value: graph neural networks for molecular property prediction, operator: contains}]}
  note: Semantic (search.semantic, 2-phase vector search).

- id: 31
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title & abstract contains "machine learning"'
  oqo: {get_rows: works, filter_rows: [{column_id: title_and_abstract.search.exact, value: '"machine learning"', operator: contains}]}
  note: Exact phrase, no stemming (.search.exact).

- id: 32
  category: "proximity & wildcards"
  provenance:
    type: "spec design"
    label: "OQL v2 spec spine"
  oxurl_representable: true
  status: ok
  oql: 'works where title contains near "smart phone" within 3 words'
  oqo: {get_rows: works, filter_rows: [{column_id: display_name.search, value: '"smart phone"~3', operator: contains}]}
  note: 'STEMMED proximity (near + within) → .search column; contrast row 21 (exact proximity).'
