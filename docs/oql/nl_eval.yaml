# NL→OQO evaluation set  (oxjob #344)
# =====================================================================
# The graded gauge for the natural-language → OQO pipeline. Each NL formulation
# is a plain-English question that should resolve to a known-good gold OQO. This
# file is the *measuring stick* — built (and frozen) before the thing it measures
# (charter `plans/oqlo.md` decision 6: NL is an eval pipeline, not a unit suite).
#
# It is a SIDECAR to docs/oql/corpus.yaml (oxjob #330): a separate file so the
# frozen, round-trip-machine-checked corpus stays clean from churny, additive NL
# cases. It cannot perturb the 144-pass corpus harness.
#
# Two row shapes (see ACCEPTANCE.md Test 1):
#   * {ref: <corpus-id>, nl: [...]}    inherits the gold OQO from corpus.yaml.
#   * {id, oqo, nl: [...]}             standalone NL-only case, own gold OQO
#                                      (Zendesk "how do I search for X" / guides).
#
# Each NL formulation is {text, difficulty} with difficulty:
#   easy = clean / well-formed — how a careful user phrases it.
#   hard = casual / conversational / indirect / arcane / messy / terse — the
#          long tail (collapses the former D2 + D3; see oxjob #382).
# Per-stratum scores (difficulty × entity × operator × group_by/sort) localize
# regressions; ~3–5 paraphrases per gold (coverage saturates fast — spend extra
# budget on more distinct golds, not more phrasings).
#
# Gold rule: store the gold OQO, NEVER a gold result set. The grader executes
# pred & gold in the SAME run so index drift cancels (EXPLORE.md §1).
#
# NOTE: two corpus rows are intentionally NOT ref'd here, both because their gold
# can't be graded by execution equivalence on the live API:
#   * row 30 (`abstract is similar to …`, semantic vector search) — its gold column
#     `abstract.search.semantic` isn't in the validator catalog.
#   * row 48 (`group by topic, year`) — MULTI-dimensional group_by is in the OQO spec
#     but the live `/query` rejects it (HTTP 400, single-dim only; see oxjob #297),
#     so neither pred nor gold can execute for Tier-2 grading.
#
# Lint with:  work/validate_nl_eval.py
version: 1
cases:

# ---------------------------------------------------------------------------
# A. Entity references, sets, annotations  (corpus rows 1–6)
#    Entity disambiguation: the NL names an entity; the model must resolve it to
#    the gold OpenAlex ID via the registry. IDs are authoritative — phrasings use
#    the institution's REAL name (I136199984=Harvard, I33213144=U. of Florida,
#    I97018004=Stanford), not the corpus's free-text annotations.
# ---------------------------------------------------------------------------
- ref: 1   # works where institution is Harvard
  nl:
    - {text: "papers affiliated with Harvard", difficulty: easy}
    - {text: "show me works from Harvard University", difficulty: easy}
    - {text: "research where at least one author is at Harvard", difficulty: hard}
    - {text: "harvard papers", difficulty: hard}

- ref: 3   # institution is any of (U. of Florida, Stanford)
  nl:
    - {text: "papers from the University of Florida or Stanford", difficulty: easy}
    - {text: "works affiliated with either Stanford or UF", difficulty: hard}
    - {text: "anything out of stanford or florida", difficulty: hard}

- ref: 4   # institution is NOT any of (U. of Florida, Stanford)
  nl:
    - {text: "papers not affiliated with the University of Florida or Stanford", difficulty: easy}
    - {text: "works from anywhere except Stanford and UF", difficulty: hard}
    - {text: "exclude florida and stanford papers", difficulty: hard}

- ref: 5   # type is any of (article, review)
  nl:
    - {text: "works that are articles or reviews", difficulty: easy}
    - {text: "only journal articles and review articles", difficulty: hard}
    - {text: "articles + reviews", difficulty: hard}

# ---------------------------------------------------------------------------
# B. Boolean logic  (corpus rows 7–10)
# ---------------------------------------------------------------------------
- ref: 7  # title contains apple and (banana or cherry)
  nl:
    - {text: "papers whose title contains apple and either banana or cherry", difficulty: easy}
    - {text: "title has apple, plus banana or cherry", difficulty: hard}
    - {text: "title: apple and (banana or cherry)", difficulty: hard}

- ref: 9  # title contains apple and banana and cherry
  nl:
    - {text: "papers whose title contains apple, banana, and cherry", difficulty: easy}
    - {text: "title mentions all three of apple, banana and cherry", difficulty: hard}
    - {text: "title has apple banana cherry all together", difficulty: hard}

- ref: 10  # title contains apple banana cherry (space = implicit AND)
  nl:
    - {text: "papers with apple banana cherry in the title", difficulty: easy}
    - {text: "title about apple banana cherry", difficulty: hard}
    - {text: "apple banana cherry in title", difficulty: hard}

# ---------------------------------------------------------------------------
# C. Search semantics  (corpus rows 11–20) — the exact / stemmed / near / wildcard
#    distinctions. Inherently subtle: the NL must signal which lever. The
#    grader's human fail-list owns the genuinely-ambiguous misses (EXPLORE §1).
# ---------------------------------------------------------------------------
- ref: 11   # title contains climate change  (stemmed AND, words may be apart)
  nl:
    - {text: "papers with climate change in the title", difficulty: easy}
    - {text: "title mentions climate change", difficulty: hard}
    - {text: "climate change in the title somewhere", difficulty: hard}

- ref: 12   # title contains "climate change"  (EXACT adjacent phrase)
  nl:
    - {text: 'papers whose title contains the exact phrase "climate change"', difficulty: easy}
    - {text: 'title has "climate change" as an exact phrase, no word variations', difficulty: hard}
    - {text: "title with climate change as an exact quoted phrase", difficulty: hard}

- ref: 13   # title contains near "whopper junior"  (STEMMED adjacent phrase)
  nl:
    - {text: 'title contains the phrase "whopper junior", allowing stemmed variants like "whoppers junior"', difficulty: hard}
    - {text: "papers with whopper junior as an adjacent phrase but matching plurals too", difficulty: hard}
    - {text: "title: whopper junior together, stemming on", difficulty: hard}

- ref: 14   # title contains "cat"  (quoted single word = EXACT, no plurals)
  nl:
    - {text: 'papers with the exact word "cat" in the title, not cats', difficulty: easy}
    - {text: "title contains cat exactly, excluding the plural", difficulty: hard}
    - {text: 'title has just "cat", no stemming', difficulty: hard}

- ref: 15   # title contains cat  (bare = stemmed, matches cats)
  nl:
    - {text: "papers with cat in the title", difficulty: easy}
    - {text: "title about cats", difficulty: hard}
    - {text: "cat in title (cats is fine too)", difficulty: hard}

- ref: 16   # title contains "rock or roll"  (literal phrase, or is a word)
  nl:
    - {text: 'papers whose title contains the exact phrase "rock or roll"', difficulty: hard}
    - {text: 'title has the literal phrase "rock or roll" (or being part of the phrase)', difficulty: hard}
    - {text: 'exact title phrase "rock or roll"', difficulty: hard}

- ref: 18  # title contains climate (change or warming)
  nl:
    - {text: "papers whose title contains climate and either change or warming", difficulty: easy}
    - {text: "title about climate change or climate warming", difficulty: hard}
    - {text: "title: climate and (change or warming)", difficulty: hard}

# (corpus row 20 = `title contains bar*` is a status:error row — prefix wildcard
# is a defined OQL error with no gold OQO — so it is intentionally NOT ref'd here.)

# ---------------------------------------------------------------------------
# D. Proximity & wildcards  (corpus rows 21–32) — arcane by nature.
# ---------------------------------------------------------------------------
- ref: 21  # title contains "smart phone" within 3 words  (EXACT proximity)
  nl:
    - {text: 'title has "smart" and "phone" within 3 words of each other, exact', difficulty: hard}
    - {text: "papers where smart and phone appear within three words in the title", difficulty: hard}
    - {text: 'title proximity: "smart phone" within 3', difficulty: hard}

- ref: 22  # title contains foo*bar  (mid-word wildcard within one token)
  nl:
    - {text: "papers whose title has a single word starting with foo and ending with bar", difficulty: hard}
    - {text: "title contains a foo…bar word (foo*bar)", difficulty: hard}
    - {text: "one title token beginning foo, ending bar", difficulty: hard}

- ref: 23  # title contains wom?n  (single-char wildcard)
  nl:
    - {text: "papers whose title matches woman or women (one variable character: wom?n)", difficulty: hard}
    - {text: "title has wom?n — exactly one wildcard character", difficulty: hard}
    - {text: "match woman/women in the title via single-char wildcard", difficulty: hard}

- ref: 31 # title & abstract contains "machine learning"  (exact phrase)
  nl:
    - {text: 'papers whose title or abstract contains the exact phrase "machine learning"', difficulty: hard}
    - {text: 'exact phrase "machine learning" in title or abstract', difficulty: hard}
    - {text: "title/abstract: machine learning as an exact phrase, no stemming", difficulty: hard}

- ref: 32 # title contains near "smart phone" within 3 words  (STEMMED proximity)
  nl:
    - {text: 'title has "smart phone" within 3 words, allowing stemmed forms', difficulty: hard}
    - {text: "stemmed proximity of smart phone within three words in the title", difficulty: hard}
    - {text: 'title: near "smart phone" within 3', difficulty: hard}

# ---------------------------------------------------------------------------
# E. Filter, sort & sample  (corpus rows 33–45) — non-works entities, sorts, operators.
# ---------------------------------------------------------------------------
- ref: 33  # works  (bare, no filters)
  nl:
    - {text: "all works", difficulty: easy}
    - {text: "every paper in OpenAlex", difficulty: hard}
    - {text: "works", difficulty: hard}

- ref: 34  # works where year is 2020
  nl:
    - {text: "papers published in 2020", difficulty: easy}
    - {text: "works from the year 2020", difficulty: easy}
    - {text: "2020 papers", difficulty: hard}

- ref: 35  # institution is any of (UF, Harvard) and year >= 2020
  nl:
    - {text: "papers from the University of Florida or Harvard published in 2020 or later", difficulty: easy}
    - {text: "works affiliated with Harvard or UF since 2020", difficulty: hard}
    - {text: "harvard or florida stuff from 2020 onwards", difficulty: hard}

- ref: 36  # institution is Memorial U. of Newfoundland sort by citations desc
  nl:
    - {text: "papers from Memorial University of Newfoundland, sorted by most cited first", difficulty: easy}
    - {text: "most cited works affiliated with Memorial University of Newfoundland", difficulty: hard}
    - {text: "memorial university of newfoundland papers, highest citations first", difficulty: hard}

- ref: 37  # institution UW AND funder NIH AND not open access
  nl:
    - {text: "University of Washington papers funded by the NIH that are not open access", difficulty: easy}
    - {text: "closed-access UW research with NIH funding", difficulty: hard}
    - {text: "non-OA papers, uw, nih funded", difficulty: hard}

- ref: 38  # title & abstract contains climate change  (stemmed AND)
  nl:
    - {text: "papers about climate change (in the title or abstract)", difficulty: easy}
    - {text: "works mentioning climate change anywhere in title or abstract", difficulty: hard}
    - {text: "climate change in title or abstract", difficulty: hard}

- ref: 39  # authors sort by works_count desc
  nl:
    - {text: "authors ranked by number of works, most prolific first", difficulty: easy}
    - {text: "which authors have the most papers", difficulty: hard}
    - {text: "authors sorted by works count descending", difficulty: easy}

- ref: 40  # authors where country is BR and has ORCID
  nl:
    - {text: "authors based in Brazil who have an ORCID", difficulty: easy}
    - {text: "brazilian authors with orcids", difficulty: hard}
    - {text: "researchers in Brazil that have an ORCID id", difficulty: hard}

- ref: 41  # authors where openalex id is A5022654839
  nl:
    - {text: "the author with OpenAlex ID A5022654839", difficulty: easy}
    - {text: "look up author A5022654839", difficulty: hard}
    - {text: "author A5022654839", difficulty: hard}

- ref: 42  # sources where type is journal
  nl:
    - {text: "sources that are journals", difficulty: easy}
    - {text: "list all journals", difficulty: hard}
    - {text: "journals", difficulty: hard}

- ref: 43  # institutions where country code is FR
  nl:
    - {text: "institutions in France", difficulty: easy}
    - {text: "french institutions", difficulty: hard}
    - {text: "universities and orgs located in France", difficulty: hard}

- ref: 44  # topics where domain is 3
  nl:
    - {text: "topics in domain 3", difficulty: easy}
    - {text: "all topics under domain id 3", difficulty: hard}
    - {text: "list the topics belonging to domain 3", difficulty: easy}

- ref: 45  # authors where last known institution is UNC and topics is climate change
  nl:
    - {text: "authors whose last known institution is UNC and who work on the climate change topic", difficulty: easy}
    - {text: "climate-change researchers currently at the University of North Carolina", difficulty: hard}
    - {text: "UNC authors studying climate change", difficulty: hard}

# ---------------------------------------------------------------------------
# F. Group by  (corpus rows 46–54)
# ---------------------------------------------------------------------------
- ref: 46  # works where author is Stephen Hawking group by author
  nl:
    - {text: "Stephen Hawking's papers, grouped by author", difficulty: easy}
    - {text: "works by Stephen Hawking broken down by co-author", difficulty: hard}
    - {text: "hawking papers counted per author", difficulty: hard}

- ref: 47  # anywhere contains near "Macrocystis pyrifera" group by author
  nl:
    - {text: 'papers mentioning "Macrocystis pyrifera" anywhere, grouped by author', difficulty: hard}
    - {text: "macrocystis pyrifera research counted per author", difficulty: hard}
    - {text: "group works about Macrocystis pyrifera by author", difficulty: hard}

# row 48 (group by topic, year) intentionally omitted — multi-dim group_by isn't
# executable on the live /query (HTTP 400), so it can't be Tier-2 graded. See header.

- ref: 49  # country is col_eu27 and country is US group by topic
  nl:
    - {text: "papers co-authored between an EU27 country and the US, grouped by topic", difficulty: hard}
    - {text: "US–EU27 collaborations counted by topic", difficulty: hard}
    - {text: "works with both a US and an EU27 affiliation, grouped by topic", difficulty: hard}

- ref: 50  # is retracted group by institution
  nl:
    - {text: "retracted papers grouped by institution", difficulty: easy}
    - {text: "which institutions have the most retractions", difficulty: hard}
    - {text: "count retractions per institution", difficulty: hard}

- ref: 51  # t&a contains near "coral bleaching" and citations > 100 group by source
  nl:
    - {text: 'papers about "coral bleaching" with more than 100 citations, grouped by source', difficulty: hard}
    - {text: "highly cited (>100) coral bleaching papers per journal", difficulty: hard}
    - {text: "coral bleaching works cited over 100 times, grouped by source", difficulty: hard}

- ref: 52  # type is book group by field
  nl:
    - {text: "books grouped by field", difficulty: easy}
    - {text: "count books per research field", difficulty: hard}
    - {text: "books broken down by field", difficulty: hard}

- ref: 53  # institution UCSB AND retracted group by author
  nl:
    - {text: "retracted papers from UC Santa Barbara grouped by author", difficulty: easy}
    - {text: "ucsb retractions per author", difficulty: hard}
    - {text: "group retracted UCSB works by author", difficulty: hard}

- ref: 54  # institution Notre Dame group by SDG
  nl:
    - {text: "Notre Dame papers grouped by Sustainable Development Goal", difficulty: easy}
    - {text: "university of notre dame works counted by SDG", difficulty: hard}
    - {text: "group Notre Dame research by SDG", difficulty: hard}

# ---------------------------------------------------------------------------
# G. Librarian & systematic-review queries  (corpus rows 55–78) — real guide/vendor/
#    Zendesk phrasings; the messy, compound long tail.
# ---------------------------------------------------------------------------
- ref: 55  # agile AND (supply/demand/value chain) AND (lead/cycle time)
  nl:
    - {text: 'papers (title or abstract) about agile AND any of "supply chain"/"demand chain"/"value chain" AND any of "lead time"/"cycle time"', difficulty: hard}
    - {text: "agile supply-chain or value-chain research that also mentions lead time or cycle time", difficulty: hard}
    - {text: "title/abstract: agile, plus a supply/demand/value chain term, plus a lead/cycle time term", difficulty: hard}

- ref: 56 # t&a contains near "smart phone" within 3 words  (stemmed proximity)
  nl:
    - {text: 'title or abstract with "smart phone" within 3 words, stemmed', difficulty: hard}
    - {text: "smart phone within three words in title or abstract, allowing stemming", difficulty: hard}
    - {text: 'stemmed proximity near "smart phone" within 3 across title and abstract', difficulty: hard}

- ref: 57 # t&a contains phone*  (trailing wildcard)
  nl:
    - {text: "papers whose title or abstract has a word starting with phone (phone, phones, phoneme...)", difficulty: hard}
    - {text: "title/abstract contains a phone* prefixed word", difficulty: hard}
    - {text: "anything starting with phone in title or abstract", difficulty: hard}

- ref: 59  # t&a contains "oyster toadfish"  (exact phrase, no lemmatization)
  nl:
    - {text: 'papers with the exact phrase "oyster toadfish" in title or abstract, no variations', difficulty: easy}
    - {text: "title or abstract containing oyster toadfish exactly", difficulty: hard}
    - {text: 'exact "oyster toadfish" anywhere in title/abstract', difficulty: hard}

- ref: 60  # t&a contains behavio*r  (mid-word wildcard, UK/US spelling)
  nl:
    - {text: "papers matching both behavior and behaviour in title or abstract", difficulty: hard}
    - {text: "title/abstract with behavio*r covering both spellings", difficulty: hard}
    - {text: "US or UK spelling of behavior in title or abstract", difficulty: hard}

- ref: 61  # autism/ASD synonyms AND intervention synonyms AND 2015-2024 AND article/review AND en
  nl:
    - {text: 'English articles or reviews from 2015–2024 about autism (or ASD, or "autism spectrum disorder") and intervention (or therapy, or treatment), searching title and abstract', difficulty: hard}
    - {text: "systematic-review search: autism interventions, 2015 to 2024, English, articles and reviews only", difficulty: hard}
    - {text: "autism/ASD intervention/therapy/treatment papers, 2015–2024, English, articles+reviews, title & abstract", difficulty: hard}

- ref: 62  # OA status gold and funder NCI
  nl:
    - {text: "gold open access papers funded by the National Cancer Institute", difficulty: easy}
    - {text: "NCI-funded gold OA works", difficulty: hard}
    - {text: "gold OA research with National Cancer Institute funding", difficulty: hard}

- ref: 63  # CRISPR and near "genome editing" and 2018-2023 sort citations desc sample 500
  nl:
    - {text: 'papers about CRISPR and "genome editing" from 2018 to 2023, sorted by most cited, take a sample of 500', difficulty: hard}
    - {text: "500-paper sample of CRISPR genome editing work 2018–2023, highest cited first", difficulty: hard}
    - {text: "CRISPR + genome editing, 2018–2023, sample 500, sort by citations descending", difficulty: hard}

- ref: 64  # raw affiliation contains library
  nl:
    - {text: "papers where a raw affiliation string contains library", difficulty: hard}
    - {text: "works with library in the affiliation text", difficulty: hard}
    - {text: "raw affiliation mentions library", difficulty: easy}

- ref: 65  # raw affiliation contains near "london hospital" within 5 words
  nl:
    - {text: 'papers whose raw affiliation has "london hospital" within 5 words', difficulty: hard}
    - {text: "london hospital within five words in the raw affiliation string", difficulty: hard}
    - {text: 'raw affiliation proximity: "london hospital" within 5', difficulty: hard}

- ref: 66  # DOI is 10.1021/es052595+
  nl:
    - {text: "the paper with DOI 10.1021/es052595+", difficulty: easy}
    - {text: "find doi 10.1021/es052595+", difficulty: hard}
    - {text: "10.1021/es052595+", difficulty: hard}

- ref: 67  # ORCID is 0000-0002-1838-9363
  nl:
    - {text: "works for ORCID 0000-0002-1838-9363", difficulty: easy}
    - {text: "papers by the researcher with orcid 0000-0002-1838-9363", difficulty: hard}
    - {text: "0000-0002-1838-9363 papers", difficulty: hard}

- ref: 69  # type is any of (article, review)
  nl:
    - {text: "only articles and reviews", difficulty: easy}
    - {text: "limit to journal articles or review articles", difficulty: hard}
    - {text: "articles or reviews only", difficulty: hard}

- ref: 70  # language is es
  nl:
    - {text: "papers written in Spanish", difficulty: easy}
    - {text: "spanish-language works", difficulty: hard}
    - {text: "works in Spanish", difficulty: easy}

- ref: 71  # t&a contains covid and t&a does not contain pediatric
  nl:
    - {text: "papers about covid but not pediatric, in title or abstract", difficulty: easy}
    - {text: "covid research excluding anything mentioning pediatric", difficulty: hard}
    - {text: "title/abstract has covid and not pediatric", difficulty: hard}

- ref: 72  # t&a contains quantum computing group by country
  nl:
    - {text: "quantum computing papers grouped by country", difficulty: easy}
    - {text: "count works about quantum computing per country", difficulty: hard}
    - {text: "quantum computing output by country", difficulty: hard}

- ref: 73  # t&a contains CRISPR and Cas9 group by author
  nl:
    - {text: "papers mentioning CRISPR and Cas9, grouped by author", difficulty: easy}
    - {text: "crispr cas9 research per author", difficulty: hard}
    - {text: "group CRISPR and Cas9 works by author", difficulty: hard}

- ref: 74  # t&a contains CRISPR group by funder
  nl:
    - {text: "CRISPR papers grouped by funder", difficulty: easy}
    - {text: "which funders support CRISPR research", difficulty: hard}
    - {text: "count CRISPR works per funder", difficulty: hard}

- ref: 75  # raw affiliation contains near "tufts boston" within 5 words
  nl:
    - {text: 'papers whose raw affiliation has "tufts boston" within 5 words', difficulty: hard}
    - {text: "tufts boston within five words in the raw affiliation", difficulty: hard}
    - {text: 'raw affiliation proximity: "tufts boston" within 5', difficulty: hard}

- ref: 77  # byline contains near "john smith" within 2 words
  nl:
    - {text: 'papers whose byline has "john smith" within 2 words (catching middle names/initials)', difficulty: hard}
    - {text: "john smith within two words in the byline", difficulty: hard}
    - {text: 'byline proximity: "john smith" within 2', difficulty: hard}

# ===========================================================================
# STANDALONE NL-ONLY CASES  (carry their own gold OQO)
#   Anchored on real sources: Zendesk "how do I search for X" tickets and
#   librarian search-guide phrasings. The "how do I…" framing and indirect
#   intent have no deterministic OQL counterpart, so they live here.
# ===========================================================================
- id: NL-ZD-001
  provenance: {type: "zendesk ticket", label: "how do I find open access papers"}
  oqo: {get_rows: works, filter_rows: [{column_id: open_access.is_oa, value: true}]}
  nl:
    - {text: "how do I find open access papers?", difficulty: hard}
    - {text: "show me only open access works", difficulty: easy}
    - {text: "papers anyone can read for free", difficulty: hard}

- id: NL-ZD-002
  provenance: {type: "zendesk ticket", label: "how do I get papers from a given year"}
  oqo: {get_rows: works, filter_rows: [{column_id: publication_year, value: 2023}]}
  nl:
    - {text: "how can I get all the papers published in 2023?", difficulty: hard}
    - {text: "everything from 2023", difficulty: hard}

- id: NL-ZD-003
  provenance: {type: "zendesk ticket", label: "how do I limit to review articles"}
  oqo: {get_rows: works, filter_rows: [{column_id: type, value: review}]}
  nl:
    - {text: "how do I get only review articles?", difficulty: hard}
    - {text: "just reviews please", difficulty: hard}

- id: NL-ZD-004
  provenance: {type: "zendesk ticket", label: "how do I search by language"}
  oqo: {get_rows: works, filter_rows: [{column_id: language, value: fr}]}
  nl:
    - {text: "how do I search for papers written in French?", difficulty: hard}
    - {text: "french papers only", difficulty: easy}

- id: NL-ZD-005
  provenance: {type: "zendesk ticket", label: "how do I find retracted papers"}
  oqo: {get_rows: works, filter_rows: [{column_id: is_retracted, value: true}]}
  nl:
    - {text: "how do I find retracted papers?", difficulty: hard}
    - {text: "show me retractions", difficulty: easy}

# (was standalone NL-ZD-006, zendesk "papers from my university (Harvard)"; its
# inline gold canonicalized identically to corpus row 2 `institution is I136199984`,
# so it now inherits that gold by ref rather than keeping a copy that could drift.)
- ref: 2
  nl:
    - {text: "how do I find all the papers from my university, Harvard?", difficulty: hard}
    - {text: "I want everything published by Harvard people", difficulty: easy}

- id: NL-LG-001
  provenance: {type: "librarian guide", label: "highly cited topic search"}
  oqo: {get_rows: works, filter_rows: [
        {column_id: title_and_abstract.search, value: CRISPR, operator: contains},
        {column_id: cited_by_count, value: 1000, operator: ">"}]}
  nl:
    - {text: "highly cited papers about CRISPR — more than 1000 citations", difficulty: easy}
    - {text: "CRISPR research with over a thousand citations", difficulty: hard}

- id: NL-LG-002
  provenance: {type: "librarian guide", label: "recent topic search, ranked by impact"}
  oqo: {get_rows: works, filter_rows: [
        {column_id: title_and_abstract.search, value: "machine learning", operator: contains},
        {column_id: publication_year, value: 2020, operator: ">="}],
        sort_by: [{column_id: cited_by_count, direction: desc}]}
  nl:
    - {text: "papers about machine learning published since 2020, sorted by most cited", difficulty: easy}
    - {text: "recent machine learning work (2020+) ranked by citations", difficulty: hard}

- id: NL-LG-003
  provenance: {type: "librarian guide", label: "gold OA filter"}
  oqo: {get_rows: works, filter_rows: [{column_id: open_access.oa_status, value: gold}]}
  nl:
    - {text: "gold open access articles", difficulty: easy}
    - {text: "papers published gold OA", difficulty: hard}

- id: NL-LG-004
  provenance: {type: "librarian guide", label: "topic counts by country"}
  oqo: {get_rows: works,
        filter_rows: [{column_id: title_and_abstract.search, value: "quantum computing", operator: contains}],
        group_by: [{column_id: authorships.countries}]}
  nl:
